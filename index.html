<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數 PWA v1.2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 2px; background-color: #334155; width: 100%; aspect-ratio: 1/1; margin: 0 auto; border: 4px solid #1e293b; }
        .cell { background: white; position: relative; padding: 4px; display: flex; flex-direction: column; justify-content: space-between; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px inset #cbd5e1; padding: 5px; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 1.1rem; line-height: 1.2; letter-spacing: 0.1rem; }
        .palace-tag { font-size: 0.75rem; color: white; padding: 2px 6px; border-radius: 4px; align-self: flex-end; background: #6366f1; }
        .dz-text { font-size: 0.7rem; color: #94a3b8; position: absolute; bottom: 4px; left: 6px; font-weight: bold; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-3xl p-6 mb-8 border-t-8 border-indigo-600">
        <h1 class="text-3xl font-bold text-center text-slate-800 ziwei-font mb-6">紫微斗數 PWA <span class="text-sm text-indigo-400 font-mono italic">v1.2.1</span></h1>
        
        <form id="ziweiForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-4">
                <div><label class="block text-xs font-bold text-slate-400 mb-1">姓名</label><input type="text" id="userName" value="楊博元" required class="w-full border-b-2 p-2 outline-none focus:border-indigo-500 bg-slate-50"></div>
                <div><label class="block text-xs font-bold text-slate-400 mb-1">性別</label><select id="gender" class="w-full border-b-2 p-2 outline-none bg-slate-50"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select></div>
            </div>
            <div class="space-y-4">
                <div><label class="block text-xs font-bold text-slate-400 mb-1">曆法</label><select id="calendarType" class="w-full border-b-2 p-2 outline-none bg-slate-50"><option value="solar">國曆 (公曆)</option><option value="lunar">農曆 (陰曆)</option></select></div>
                <div><label class="block text-xs font-bold text-slate-400 mb-1">出生日期</label><input type="date" id="birthDate" value="1989-10-01" required class="w-full border-b-2 p-2 outline-none bg-slate-50"></div>
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 mb-1">出生時辰</label>
                <select id="birthHour" class="w-full border-b-2 p-2 outline-none bg-slate-50">
                    <option value="late-zi">晚子 (23:00-00:00) 算隔日</option><option value="0">早子 (00:00-01:00)</option>
                    <option value="1">丑</option><option value="2">寅</option><option value="3">卯</option><option value="4">辰</option><option value="5">巳</option><option value="6">午</option><option value="7">未</option><option value="8">申</option><option value="9">酉</option><option value="10">戌</option><option value="11">亥</option>
                </select>
            </div>
            <div class="md:col-span-2 flex flex-col gap-3 mt-4">
                <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-800 transition-all">執行排盤</button>
                <div class="flex gap-3">
                    <button type="button" onclick="exportImage()" class="flex-1 bg-slate-800 text-white py-2 rounded-xl text-sm font-medium">儲存命盤圖片</button>
                    <button type="button" onclick="location.reload()" class="flex-1 bg-slate-200 text-slate-600 py-2 rounded-xl text-sm italic">強制更新</button>
                </div>
            </div>
        </form>
    </div>

    <div id="chartView" class="hidden">
        <div id="captureArea" class="bg-slate-900 p-2 md:p-4 rounded-xl shadow-2xl overflow-hidden">
            <div class="chart-grid" id="mainChart"><div class="center-box" id="centerInfo"></div></div>
        </div>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING_MAP = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            const isLunar = document.getElementById('calendarType').value === 'lunar';
            let [y, m, d] = dateStr.split('-').map(Number);
            
            let lunar, solar;
            if (isLunar) {
                lunar = Lunar.fromYmd(y, m, d);
                solar = lunar.getSolar();
            } else {
                solar = Solar.fromYmd(y, m, d);
                if (hVal === "late-zi") solar = solar.next(1);
                lunar = solar.getLunar();
            }

            let lMonth = lunar.getMonth(), lDay = lunar.getDay();
            let yTGIdx = (lunar.getYear() - 4) % 10; // 年干索引
            let hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);

            // 命宮定位 (1.0.7 核心)
            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;

            // --- 精準五行局計算 ---
            const startTG = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0]; // 根據年干求寅位天干
            let mTGIdx = (startTG[yTGIdx] + mPos) % 10; // 命宮天干
            let dzG = Math.floor(mPos / 2); // 命宮地支組 (子丑=0, 寅卯=1...)
            let tgG = Math.floor(mTGIdx / 2); // 命宮天干組 (甲乙=0, 丙丁=1...)
            const jMatrix = [[4,2,6,3,5],[2,6,3,5,4],[6,3,5,4,2],[3,5,4,2,6],[5,4,2,6,3],[4,2,6,3,5]];
            let juice = jMatrix[dzG][tgG];

            let zPos = calcZiwei(juice, lDay);
            let fPos = (4 - zPos + 12) % 12;

            let stars = Array.from({length:12}, () => []);
            ["紫微","天機","","太陽","武曲","天同","","","廉貞"].forEach((s,i)=>{ if(s) stars[(zPos-i+12)%12].push(s); });
            ["天府","太陰","貪狼","巨門","天相","天梁","七殺"].forEach((s,i)=>{ stars[(fPos+i)%12].push(s); });
            stars[3].push("破軍"); 

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            
            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let sHtml = stars[dzIdx].map(s => `<div class="main-star">${s}</div>`).join('');
                cell.innerHTML = `<div class="flex flex-row-reverse h-full max-h-[80%] overflow-hidden">${sHtml}</div><span class="dz-text">${DZ[dzIdx]}</span><span class="palace-tag ${pIdx===0?'bg-red-600 font-bold scale-110 shadow-md':''}">${PALACES[pIdx]}</span>`;
                area.insertBefore(cell, area.children[gIdx]);
            });

            // 中宮資訊：同時顯示國曆與農曆
            document.getElementById('centerInfo').innerHTML = `
                <p class="text-xl font-black ziwei-font text-slate-800 mb-2">${name}</p>
                <div class="space-y-1">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Solar / 國曆</p>
                    <p class="text-xs text-slate-700">${solar.toYmd()}</p>
                    <div class="h-px bg-slate-200 w-8 mx-auto my-1"></div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Lunar / 農曆</p>
                    <p class="text-xs text-slate-700 font-medium">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p>
                </div>
                <div class="px-4 py-1 bg-red-100 text-red-700 text-sm font-bold rounded-full mt-4 border border-red-200 shadow-sm">${WUXING_MAP[juice]}</div>
            `;
            document.getElementById('chartView').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('chartView').offsetTop, behavior: 'smooth' });
        }

        function calcZiwei(j, d) { let q = Math.ceil(d/j), r = d%j, s = (q+1)%12; return (r===0) ? (s+1)%12 : (r%2===0) ? (s+r)%12 : (s-r+12)%12; }
        function exportImage() { const btn = event.target; btn.innerText = "生成中..."; html2canvas(document.getElementById('captureArea')).then(canvas => { const link = document.createElement('a'); link.download = `${document.getElementById('userName').value}_命盤.png`; link.href = canvas.toDataURL(); link.click(); btn.innerText = "儲存命盤圖片"; }); }
    </script>
</body>
</html>
