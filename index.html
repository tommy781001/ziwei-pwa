<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數 PWA v1.3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-container { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background-color: #334155; 
            border: 4px solid #1e293b; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(4, 1fr); 
            gap: 2px;
        }
        .cell { background: white; position: relative; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 0.8rem; font-weight: bold; }
        .center-box { 
            grid-column: 2 / 4; 
            grid-row: 2 / 4; 
            background: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 12px;
            border: 1px inset #cbd5e1;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-3xl p-6 mb-8 border-t-8 border-indigo-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 ziwei-font">紫微斗數 PWA</h1>
            <span class="text-xs font-mono text-indigo-400 bg-indigo-50 px-2 py-1 rounded">v1.3.1</span>
        </div>
        
        <form id="ziweiForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">姓名</label>
                <input type="text" id="userName" value="楊博元" required class="w-full border-b-2 p-2 outline-none focus:border-indigo-500 bg-slate-50">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">性別</label>
                <select id="gender" class="w-full border-b-2 p-2 outline-none bg-slate-50">
                    <option value="1">乾造 (男)</option>
                    <option value="0">坤造 (女)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">曆法類型</label>
                <select id="calendarType" class="w-full border-b-2 p-2 outline-none bg-slate-50">
                    <option value="solar">國曆 (公曆)</option>
                    <option value="lunar">農曆 (陰曆)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">出生日期</label>
                <input type="date" id="birthDate" value="1989-10-01" required class="w-full border-b-2 p-2 outline-none bg-slate-50">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 mb-1">出生時辰</label>
                <select id="birthHour" class="w-full border-b-2 p-2 outline-none bg-slate-50">
                    <option value="0">早子 (00:00 - 01:00)</option>
                    <option value="1">丑時 (01:00 - 03:00)</option>
                    <option value="2">寅時 (03:00 - 05:00)</option>
                    <option value="3">卯時 (05:00 - 07:00)</option>
                    <option value="4">辰時 (07:00 - 09:00)</option>
                    <option value="5">巳時 (09:00 - 11:00)</option>
                    <option value="6">午時 (11:00 - 13:00)</option>
                    <option value="7">未時 (13:00 - 15:00)</option>
                    <option value="8">申時 (15:00 - 17:00)</option>
                    <option value="9">酉時 (17:00 - 19:00)</option>
                    <option value="10">戌時 (19:00 - 21:00)</option>
                    <option value="11">亥時 (21:00 - 23:00)</option>
                    <option value="late-zi">晚子 (23:00 - 00:00) 算隔日</option>
                </select>
            </div>
            
            <div class="md:col-span-2 flex flex-col gap-3 mt-4">
                <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-800 transition-all text-lg">執行排盤</button>
                <button type="button" onclick="location.reload()" class="w-full bg-slate-200 text-slate-600 py-2 rounded-xl text-sm font-medium hover:bg-slate-300 transition-all">強制更新</button>
            </div>
        </form>
    </div>

    <div id="chartView" class="hidden max-w-2xl mx-auto">
        <div class="bg-slate-900 p-2 md:p-4 rounded-xl shadow-2xl">
            <div class="chart-container" id="mainChart">
                <div class="center-box" id="centerInfo"></div>
                <div class="cell">巳</div><div class="cell">午</div><div class="cell">未</div><div class="cell">申</div>
                <div class="cell">辰</div><div class="cell">酉</div>
                <div class="cell">卯</div><div class="cell">戌</div>
                <div class="cell">寅</div><div class="cell">丑</div><div class="cell">子</div><div class="cell">亥</div>
            </div>
        </div>
    </div>

    <script>
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const WUXING = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('userName').value;
            const genderStr = document.getElementById('gender').value === "1" ? "乾造 (男)" : "坤造 (女)";
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            const hourText = document.getElementById('birthHour').options[document.getElementById('birthHour').selectedIndex].text.split(' ')[0];
            const isLunarInput = document.getElementById('calendarType').value === 'lunar';
            
            let [y, m, d] = dateStr.split('-').map(Number);
            let solar, lunar;

            if (isLunarInput) {
                lunar = Lunar.fromYmd(y, m, d);
                if (hVal === "late-zi") lunar = lunar.next(1);
                solar = lunar.getSolar();
            } else {
                solar = Solar.fromYmd(y, m, d);
                if (hVal === "late-zi") solar = solar.next(1);
                lunar = solar.getLunar();
            }

            // --- 五行局公式計算 ---
            const yTGIdx = TG.indexOf(lunar.getYearGan());
            const hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);
            const mPos = (2 + (lunar.getMonth() - 1) - hIdx + 12) % 12; // 命宮地支索引
            
            // 五虎遁：甲己起丙, 乙庚起戊, 丙辛起庚, 丁壬起壬, 戊癸起甲
            const startTGIdx = (yTGIdx % 5) * 2 + 2; 
            const mTGIdx = (startTGIdx + (mPos - 2 + 12) % 12) % 10; // 命宮天干索引

            // 納音五行局矩陣
            function getWuxingJuice(tgIdx, dzIdx) {
                const tgGroup = Math.floor(tgIdx / 2); // 甲乙=0, 丙丁=1, 戊己=2, 庚辛=3, 壬癸=4
                const dzGroup = Math.floor(dzIdx / 2); // 子丑=0, 寅卯=1, 辰巳=2, 午未=3, 申酉=4, 戌亥=5
                const table = [
                    [4, 6, 5, 4, 6, 5], // 甲乙
                    [2, 4, 3, 2, 4, 3], // 丙丁
                    [5, 2, 6, 5, 2, 6], // 戊己
                    [3, 5, 4, 3, 5, 4], // 庚辛
                    [6, 3, 2, 6, 3, 2]  // 壬癸
                ];
                return table[tgGroup][dzGroup];
            }
            const juice = getWuxingJuice(mTGIdx, mPos);

            // 更新中宮
            document.getElementById('centerInfo').innerHTML = `
                <p class="text-xl font-black text-slate-800 mb-1">${name}</p>
                <p class="text-xs text-indigo-600 font-bold mb-3">${genderStr} / ${hourText}</p>
                <div class="space-y-1.5 w-full">
                    <div class="bg-white px-2 py-1.5 rounded border border-slate-100 shadow-sm text-left">
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Solar 國曆</p>
                        <p class="text-xs text-slate-700 font-mono">${solar.toYmd()}</p>
                    </div>
                    <div class="bg-white px-2 py-1.5 rounded border border-slate-100 shadow-sm text-left">
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Lunar 農曆</p>
                        <p class="text-xs text-slate-700">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p>
                    </div>
                </div>
                <div class="mt-4 px-4 py-1 bg-red-50 text-red-600 text-sm font-black rounded-full border border-red-100 shadow-inner">
                    ${WUXING[juice]}
                </div>
            `;

            document.getElementById('chartView').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('chartView').offsetTop, behavior: 'smooth' });
        });
    </script>
</body>
</html>
