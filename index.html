<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微 PWA v1.1.9 - 最終修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f8fafc; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #1e293b; width: 100%; max-width: 600px; aspect-ratio: 1/1; margin: 0 auto; border: 2px solid #0f172a; }
        .cell { background: white; position: relative; padding: 2px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.85rem; line-height: 1.1; margin-left: 1px; }
        .small-star { writing-mode: vertical-rl; font-size: 0.65rem; line-height: 1; margin-left: 1px; color: #64748b; }
        .palace-tag { font-size: 0.65rem; color: white; padding: 2px 4px; border-radius: 2px; align-self: flex-end; background: #6366f1; }
        .dz-text { font-size: 0.6rem; color: #94a3b8; position: absolute; bottom: 2px; left: 4px; font-weight: bold; }
    </style>
</head>
<body class="p-2 sm:p-6">

    <div class="max-w-md mx-auto bg-white shadow-2xl rounded-3xl p-6 mb-6 border-t-8 border-indigo-600">
        <h1 class="text-2xl font-bold text-center text-slate-800 ziwei-font mb-4">紫微斗數 PWA <span class="text-xs text-indigo-400 font-mono">v1.1.9</span></h1>
        
        <form id="ziweiForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="userName" placeholder="姓名" required class="border-b-2 p-2 outline-none focus:border-indigo-500">
                <select id="gender" class="border-b-2 p-2 outline-none"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="date" id="birthDate" required class="border-b-2 p-2 outline-none">
                <select id="birthHour" class="border-b-2 p-2 outline-none">
                    <option value="late-zi">晚子 (23:00-00:00) 算隔日</option>
                    <option value="0">早子 (00:00-01:00)</option><option value="1">丑</option><option value="2">寅</option>
                    <option value="3">卯</option><option value="4">辰</option><option value="5">巳</option>
                    <option value="6">午</option><option value="7">未</option><option value="8">申</option>
                    <option value="9">酉</option><option value="10">戌</option><option value="11">亥</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform">執行排盤</button>
        </form>
    </div>

    <div id="chartView" class="hidden text-center pb-10">
        <div id="captureArea" class="inline-block p-2 bg-slate-800 rounded-lg shadow-2xl">
            <div class="chart-grid" id="mainChart"><div class="center-box" id="centerInfo"></div></div>
        </div>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING_MAP = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            let [y, m, d] = dateStr.split('-').map(Number);
            
            // --- 1.0.7 原始日期處理邏輯 ---
            let solar = Solar.fromYmd(y, m, d);
            if (hVal === "late-zi") { solar = solar.next(1); }
            let lunar = solar.getLunar();
            let lMonth = lunar.getMonth(), lDay = lunar.getDay(), yTGIdx = (lunar.getYear() - 4) % 10;
            let hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);

            // --- 1.0.7 原始命宮定位 ---
            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;
            const jTable = [[4,4,3,3,5,5,4,4,3,3,5,5],[2,2,6,6,3,3,2,2,6,6,3,3],[5,5,4,4,2,2,5,5,4,4,2,2],[3,3,5,5,4,4,3,3,5,5,4,4],[6,6,2,2,5,5,6,6,2,2,5,5]];
            let juice = jTable[yTGIdx % 5][mPos];
            
            // --- 1.0.7 原始星曜定位 ---
            let zPos = calcZiwei(juice, lDay);
            let fPos = (4 - zPos + 12) % 12;
            let stars = Array.from({length:12}, () => []);

            // 紫微星系
            ["紫微","天機","","太陽","武曲","天同","","","廉貞"].forEach((s,i)=>{ if(s) stars[(zPos-i+12)%12].push(s); });
            // 天府星系 (破軍修正至卯位)
            ["天府","太陰","貪狼","巨門","天相","天梁","七殺"].forEach((s,i)=>{ stars[(fPos+i)%12].push(s); });
            stars[3].push("破軍"); // 卯位固定為 3

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let sHtml = stars[dzIdx].map(s => `<div class="main-star">${s}</div>`).join('');
                cell.innerHTML = `<div class="flex flex-row-reverse h-24">${sHtml}</div><span class="dz-text">${DZ[dzIdx]}</span><span class="palace-tag ${pIdx===0?'bg-red-600':''}">${PALACES[pIdx]}</span>`;
                area.insertBefore(cell, area.children[gIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `<p class="font-bold ziwei-font">${name}</p><p class="text-[10px]">${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p><div class="text-xs text-red-600 mt-2">${WUXING_MAP[juice]}</div>`;
            document.getElementById('chartView').classList.remove('hidden');
        }
        function calcZiwei(j, d) { let q = Math.ceil(d/j), r = d%j, s = (q+1)%12; return (r===0) ? (s+1)%12 : (r%2===0) ? (s+r)%12 : (s-r+12)%12; }
    </script>
</body>
</html>
