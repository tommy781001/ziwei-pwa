<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微排盤 v1.0.5</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #333; 
            width: 100%; max-width: 500px; aspect-ratio: 1/1; margin: 0 auto; border: 2px solid #333;
        }
        .cell { 
            background: white; position: relative; padding: 4px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
        }
        .center-box { 
            grid-column: 2 / 4; grid-row: 2 / 4; background: #faf5ff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8px;
        }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.8rem; line-height: 1.1; }
        .palace-tag { font-size: 0.65rem; color: white; padding: 2px 5px; border-radius: 2px; align-self: flex-end; }
        .dz-text { font-size: 0.6rem; color: #94a3b8; position: absolute; bottom: 2px; left: 4px; }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div class="max-w-md mx-auto bg-white shadow-xl rounded-2xl p-5 mb-6 border-b-4 border-purple-600">
        <h1 class="text-2xl font-bold text-center text-purple-900 ziwei-font mb-1">紫微斗數 PWA</h1>
        <p class="text-center text-[10px] text-gray-400 font-mono mb-4">Version 1.0.5</p>
        
        <form id="ziweiForm" class="grid grid-cols-2 gap-3 text-sm">
            <div class="col-span-1">
                <label class="block text-xs text-gray-500 mb-1">姓名</label>
                <input type="text" id="userName" placeholder="請輸入姓名" required class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
            </div>
            <div class="col-span-1">
                <label class="block text-xs text-gray-500 mb-1">性別</label>
                <select id="gender" class="w-full border p-2 rounded-lg"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
            </div>
            <div class="col-span-1">
                <label class="block text-xs text-gray-500 mb-1">曆法</label>
                <select id="calendarType" class="w-full border p-2 rounded-lg">
                    <option value="solar">國曆</option>
                    <option value="lunar">農曆</option>
                </select>
            </div>
            <div class="col-span-1">
                <label class="block text-xs text-gray-500 mb-1">出生日期</label>
                <input type="date" id="birthDate" required class="w-full border p-2 rounded-lg">
            </div>
            <div class="col-span-2">
                <label class="block text-xs text-gray-500 mb-1">出生時辰 (使用 24 小時制)</label>
                <select id="birthHour" class="w-full border p-2 rounded-lg">
                    <option value="晚子">晚子 (23:00-00:00) 需跳隔日排盤</option>
                    <option value="早子">早子 (00:00-01:00)</option>
                    <option value="1">丑 (01:00-03:00)</option><option value="2">寅 (03:00-05:00)</option>
                    <option value="3">卯 (05:00-07:00)</option><option value="4">辰 (07:00-09:00)</option>
                    <option value="5">巳 (09:00-11:00)</option><option value="6">午 (11:00-13:00)</option>
                    <option value="7">未 (13:00-15:00)</option><option value="8">申 (15:00-17:00)</option>
                    <option value="9">酉 (17:00-19:00)</option><option value="10">戌 (19:00-21:00)</option>
                    <option value="11">亥 (21:00-23:00)</option>
                </select>
            </div>
            <button type="submit" class="col-span-1 bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">執行排盤</button>
            <button type="button" onclick="saveData()" class="col-span-1 bg-purple-100 text-purple-900 py-3 rounded-xl transition-all shadow-sm font-semibold active:scale-95">儲存命盤</button>
            <button type="button" onclick="forceReload()" class="col-span-2 text-[10px] text-gray-400 underline text-center mt-2">強制清除快取並重新載入</button>
        </form>
    </div>

    <div id="chartView" class="hidden">
        <div class="chart-grid" id="mainChart">
            <div class="center-box">
                <div id="centerInfo" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING_MAP = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };
        const ZIWEI_GRP = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
        const TIANFU_GRP = ["天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "", "", "", "", "破軍"];

        function forceReload() {
            localStorage.clear();
            window.location.reload(true);
        }

        // 儲存資料到 LocalStorage
        function saveData() {
            const name = document.getElementById('userName').value;
            const data = {
                name: name,
                gender: document.getElementById('gender').value,
                cal: document.getElementById('calendarType').value,
                date: document.getElementById('birthDate').value,
                hour: document.getElementById('birthHour').value
            };
            localStorage.setItem('ziwei_saved_' + name, JSON.stringify(data));
            alert('命盤資料已儲存為：' + name);
        }

        document.getElementById('ziweiForm').addEventListener('submit', function(e) { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value;
            const hVal = document.getElementById('birthHour').value;
            const isSolar = document.getElementById('calendarType').value === 'solar';
            if(!dateStr) return;

            let d = new Date(dateStr);
            let hIdx = (hVal === '晚子' || hVal === '早子') ? 0 : parseInt(hVal);
            if (hVal === '晚子') d.setDate(d.getDate() + 1);

            let lunar = isSolar ? 
                Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()) : 
                Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()); 

            let lMonth = lunar.getMonth(); // 此處 Lunar 庫傳回 1-12，九月傳回 9。
            let lDay = lunar.getDay();     // 九月初三傳回 3。
            let yTGIdx = (lunar.getYear() - 4) % 10;

            // --- 暴力對照法定命宮 (修正偏移) ---
            // 寅=2, 卯=3, 辰=4, 巳=5, 午=6, 未=7,申=8, 酉=9, 戌=10, 亥=11, 子=0, 丑=1
            // 九月生 (lMonth=9), 子時 (hIdx=0)
            // 計算：(2 + (9-1) - 0 + 12) % 12 = 10 (戌位)
            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;

            // 五行局查表
            const jTable = [
                [4,4,3,3,5,5,4,4,3,3,5,5], // 甲己
                [2,2,6,6,3,3,2,2,6,6,3,3], // 乙庚
                [5,5,4,4,2,2,5,5,4,4,2,2], // 丙辛
                [3,3,5,5,4,4,3,3,5,5,4,4], // 丁壬
                [6,6,2,2,5,5,6,6,2,2,5,5]  // 戊癸
            ];
            let juice = jTable[yTGIdx % 5][mPos];

            // 紫微定位
            let zPos = calcZiwei(juice, lDay);
            let fPos = (4 - zPos + 12) % 12;

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];

            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // 命宮逆數
                let pIdx = (mPos - dzIdx + 12) % 12;
                let stars = [];
                ZIWEI_GRP.forEach((v, i) => { if(v && (zPos - i + 12) % 12 === dzIdx) stars.push(v); });
                TIANFU_GRP.forEach((v, i) => { if(v && (fPos + i) % 12 === dzIdx) stars.push(v); });

                cell.innerHTML = `
                    <div class="flex flex-row-reverse h-14 space-x-reverse space-x-1">${stars.map(x=>`<span class="main-star">${x}</span>`).join('')}</div>
                    <span class="dz-text">${DZ[dzIdx]}</span>
                    <span class="palace-tag ${pIdx===0?'bg-red-600 shadow-sm font-bold':'bg-purple-500'}">${PALACES[pIdx]}</span>
                `;
                area.insertBefore(cell, area.children[gIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `
                <p class="font-bold text-lg text-purple-950 ziwei-font">${name}</p>
                <p class="text-[10px] text-gray-500 font-medium">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p>
                <div class="inline-block px-3 py-1 bg-red-50 text-red-600 text-xs font-bold rounded-full mt-2 border border-red-100">${WUXING_MAP[juice]}</div>
            `;
            document.getElementById('chartView').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function calcZiwei(j, d) {
            let q = Math.ceil(d/j), r = d%j;
            let s = (q+1)%12;
            if(r===0) return (s+1)%12;
            return (r%2===0) ? (s+r)%12 : (s-r+12)%12;
        }
    </script>
</body>
</html>
