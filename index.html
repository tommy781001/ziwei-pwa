<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數 PWA v1.8.0 (吉煞四化全開版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-container { 
            width: 100%; aspect-ratio: 1/1; background-color: #334155; 
            border: 4px solid #1e293b; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 2px;
        }
        .cell { background: white; position: relative; padding: 4px; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; overflow: hidden; }
        
        /* 吉煞星樣式 (藍色、小字、垂直) */
        .aux-star-container { display: flex; flex-direction: column; height: 100%; width: 10px; flex-shrink: 0; gap: 1px; padding-right: 2px; }
        .aux-star { writing-mode: vertical-rl; color: #1e40af; font-size: 0.6rem; font-weight: medium; line-height: 1; letter-spacing: -0.05rem; }
        .aux-star.sha { color: #d97706; } /* 煞星用橘色 */

        /* 主星樣式 (維持紅色、垂直) */
        .star-container { display: flex; flex-direction: row-reverse; height: 100%; overflow: hidden; gap: 2px; padding-top: 1px; position: relative;}
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 1.05rem; line-height: 1; letter-spacing: 0.05rem; font-family: 'Noto Serif TC', serif; position: relative; display: flex; align-items: center;}
        
        /* 四化樣式 */
        .shihua { writing-mode: horizontal-tb; font-size: 0.5rem; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); color: white; padding: 1px 2px; border-radius: 2px; font-weight: black; line-height: 1;}
        .shihua.lu { background-color: #be123c; } /* 祿 紅 */
        .shihua.quan { background-color: #15803d; } /* 權 綠 */
        .shihua.ke { background-color: #1d4ed8; } /* 科 藍 */
        .shihua.ji { background-color: #111827; } /* 忌 黑 */

        .center-box { 
            grid-column: 2 / 4; grid-row: 2 / 4; background: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            text-align: center; padding: 8px; border: 1px inset #cbd5e1;
        }
        .palace-tag { font-size: 0.7rem; color: white; padding: 2px 5px; border-radius: 4px; background: #6366f1; font-weight: bold; align-self: flex-end; position: absolute; bottom: 4px; right: 4px;}
        .palace-tag.is-ming { background: #be123c; transform: scale(1.1); }
        .dz-text { font-size: 0.7rem; color: #94a3b8; position: absolute; bottom: 4px; left: 6px; font-weight: bold; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-3xl p-6 mb-6 border-t-8 border-indigo-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 ziwei-font">紫微斗數 PWA</h1>
            <span class="text-xs font-mono text-indigo-400 bg-indigo-50 px-2 py-1 rounded">v1.8.0</span>
        </div>
        
        <form id="ziweiForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-xs font-bold text-slate-400 mb-1">姓名</label><input type="text" id="userName" value="楊博元" required class="w-full border-b-2 p-1 outline-none bg-slate-50"></div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">性別</label>
                <select id="gender" class="w-full border-b-2 p-1 outline-none bg-slate-50">
                    <option value="1">男</option><option value="0">女</option>
                </select>
            </div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">曆法選擇</label><select id="calendarType" class="w-full border-b-2 p-1 outline-none bg-slate-50"><option value="solar">國曆 (公曆)</option><option value="lunar">農曆 (陰曆)</option></select></div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">出生日期</label><input type="date" id="birthDate" value="1989-10-01" required class="w-full border-b-2 p-1 outline-none bg-slate-50"></div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 mb-1">出生時辰</label>
                <select id="birthHour" class="w-full border-b-2 p-1 outline-none bg-slate-50">
                    <option value="0">00:00-01:00 (早子)</option><option value="1">丑時</option><option value="2">寅時</option><option value="3">卯時</option><option value="4">辰時</option><option value="5">巳時</option><option value="6">午時</option><option value="7">未時</option><option value="8">申時</option><option value="9">酉時</option><option value="10">戌時</option><option value="11">亥時</option>
                    <option value="late-zi">23:00-00:00 (晚子)</option>
                </select>
            </div>
            <div class="md:col-span-2 flex flex-col gap-3 mt-4">
                <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all text-lg">執行排盤</button>
                <button type="button" onclick="location.reload()" class="w-full bg-slate-200 text-slate-600 py-2 rounded-xl text-sm hover:bg-slate-300">強制更新</button>
            </div>
        </form>
    </div>

    <div id="chartView" class="hidden max-w-2xl mx-auto">
        <div class="bg-slate-900 p-1 md:p-4 rounded-xl shadow-2xl overflow-hidden">
            <div class="chart-container" id="mainChart"><div class="center-box" id="centerInfo"></div></div>
        </div>
    </div>

    <script>
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const genderVal = document.getElementById('gender').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            const hourDisplayName = document.getElementById('birthHour').options[document.getElementById('birthHour').selectedIndex].text.match(/\((.*?)\)/)[1];
            
            const isLunarInput = document.getElementById('calendarType').value === 'lunar';
            let [y, m, d] = dateStr.split('-').map(Number);
            let solar, lunar;

            if (isLunarInput) {
                lunar = Lunar.fromYmd(y, m, d);
                if (hVal === "late-zi") lunar = lunar.next(1);
                solar = lunar.getSolar();
            } else {
                solar = Solar.fromYmd(y, m, d);
                if (hVal === "late-zi") solar = solar.next(1);
                lunar = solar.getLunar();
            }

            const lMonth = lunar.getMonth();
            const lDay = lunar.getDay();
            const ganName = lunar.getYearGan();
            const zhiName = lunar.getYearZhi();
            const yTGIdx = TG.indexOf(ganName);
            const hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);
            const personType = (yTGIdx % 2 === 0 ? "陽" : "陰") + (genderVal === "1" ? "男" : "女");

            // --- 封存邏輯 ---
            // 1. 宮位
            const mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;
            const startTGIdx = (yTGIdx % 5) * 2 + 2; 
            const mTGIdx = (startTGIdx + (mPos - 2 + 12) % 12) % 10;
            const juice = (function(tg, dz){
                const tn = Math.floor(tg/2)+1, dn = (Math.floor(dz/2)%3)+1;
                let n = tn+dn; if(n>5) n-=5;
                return {1:3, 2:4, 3:2, 4:6, 5:5}[n];
            })(mTGIdx, mPos);

            // 2. 安紫微星 (借數法)
            function getZw(d, j) {
                let q = d%j===0 ? d/j : Math.floor(d/j)+1, r = (q*j)-d;
                let p = (q+1)%12;
                return r===0 ? p : (r%2!==0 ? (p-r+12)%12 : (p+r)%12);
            }
            const zwPos = getZw(lDay, juice);

            // --- 全新邏輯 ---
            // 3. 安吉煞星全體與生年四化地圖
            let mainStarMap = Array.from({length: 12}, () => []); // [{name: '紫微', shihua: 'lu'}, ...]
            let auxStarMap = Array.from({length: 12}, () => []); // [{name: '左輔', type: 'ji'}, ...]

            // 3-1. 生年四化設定 (甲,乙...癸)
            const shihuaConf = [
                ['廉貞', '破軍', '武曲', '太陽'], // 甲
                ['天機', '天梁', '紫微', '太陰'], // 乙
                ['天同', '天機', '文昌', '廉貞'], // 丙
                ['太陰', '天同', '天機', '巨門'], // 丁
                ['貪狼', '太陰', '右弼', '天機'], // 戊
                ['武曲', '貪狼', '天梁', '文曲'], // 己
                ['太陽', '武曲', '太陰', '天同'], // 庚
                ['巨門', '太陽', '文曲', '文昌'], // 辛
                ['天梁', '紫微', '左輔', '武曲'], // 壬
                ['破軍', '巨門', '陰煞', '貪狼']  // 癸
            ];
            const currentShihua = shihuaConf[yTGIdx];
            const luStar = currentShihua[0], quanStar = currentShihua[1], keStar = currentShihua[2], jiStar = currentShihua[3];

            // 3-2. 主星系佈局
            const zwSOrder = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
            zwSOrder.forEach((s, i) => { if(s) {
                let sh = '';
                if(s === luStar) sh='lu'; else if(s === quanStar) sh='quan'; else if(s === keStar) sh='ke'; else if(s === jiStar) sh='ji';
                mainStarMap[(zwPos-i+12)%12].push({name: s, shihua: sh});
            }});
            const tfPos = (4 - zwPos + 12) % 12;
            const tfSOrder = ["天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "", "", "", "破軍"];
            tfSOrder.forEach((s, i) => { if(s) {
                let sh = '';
                if(s === luStar) sh='lu'; else if(s === quanStar) sh='quan'; else if(s === keStar) sh='ke'; else if(s === jiStar) sh='ji';
                mainStarMap[(tfPos+i)%12].push({name: s, shihua: sh});
            }});

            // 3-3. 安吉星
            // 生月：左輔(辰起順), 右弼(戌起逆)
            auxStarMap[(4 + lMonth - 1) % 12].push({name: '左輔', type: 'ji'});
            auxStarMap[(10 - lMonth + 1 + 12) % 12].push({name: '右弼', type: 'ji'});
            // 生時：文昌(戌起逆), 文曲(辰起順)
            auxStarMap[(10 - hIdx + 12) % 12].push({name: '文昌', type: 'ji'});
            auxStarMap[(4 + hIdx) % 12].push({name: '文曲', type: 'ji'});
            // 生年：天魁(甲戊庚:丑, 乙己:子, 丙丁:亥, 辛:午, 壬癸:卯), 天鉞(天魁對稱)
            const kuiYueMap = {'甲': [1,7], '乙': [0,8], '丙': [11,9], '丁': [11,9], '戊': [1,7], '己': [0,8], '庚': [1,7], '辛': [6,2], '壬': [3,5], '癸': [3,5]};
            auxStarMap[k kuiYueMap[ganName][0]].push({name: '天魁', type: 'ji'});
            auxStarMap[k k kuiYueMap[ganName][1]].push({name: '天鉞', type: 'ji'});

            // 3-4. 安煞星
            // 生時：地空(亥起逆), 地劫(亥起順)
            auxStarMap[(11 - hIdx + 12) % 12].push({name: '地空', type: 'sha'});
            auxStarMap[(11 + hIdx) % 12].push({name: '地劫', type: 'sha'});
            // 生年：火星(寅戌人丑, 申辰人寅, 巳酉丑人卯), 鈴星(申辰人戌, 寅戌人卯, 巳酉丑人戌) -> 複雜口訣
            // 簡化口訣：寅午戌丑卯, 申子辰寅戌, 巳酉丑卯戌, 亥卯未酉戌 -> 火星/鈴星起點
            const huolingStart = {'寅': [1,3], '午': [1,3], '戌': [1,3], '申': [2,10], '子': [2,10], '辰': [2,10], '巳': [3,10], '酉': [3,10], '丑': [3,10], '亥': [9,10], '卯': [9,10], '未': [9,10]};
            auxStarMap[(huolingStart[zhiName][0] + hIdx) % 12].push({name: '火星', type: 'sha'});
            auxStarMap[(huolingStart[zhiName][1] + hIdx) % 12].push({name: '鈴星', type: 'sha'});
            // 生年：擎羊, 陀羅 (祿存前後)
            const lucunPos = TG.indexOf(ganName) % 5 === 0 ? [3,5,6,8,11,0,2,3,5,6][yTGIdx] : {'乙':8, '丁':5, '己':5, '辛':2, '癸':11}[ganName];
            auxStarMap[(lucunPos + 1) % 12].push({name: '擎羊', type: 'sha'});
            auxStarMap[(lucunPos - 1 + 12) % 12].push({name: '陀羅', type: 'sha'});

            // 4. 渲染
            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const gridOrder = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            
            gridOrder.forEach((dzIdx) => {
                if (dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // 吉煞煞星 (藍色、橘色垂直小字)
                let auxHtml = '<div class="aux-star-container">';
                auxStarMap[dzIdx].forEach(s => { auxHtml += `<div class="aux-star ${s.type==='sha'?'sha':''}">${s.name}</div>`; });
                auxHtml += '</div>';

                // 主星 + 四化 (紅色垂直、小圓點四化)
                const uniqueStars = [...new Set(mainStarMap[dzIdx].map(s=>JSON.stringify(s)))].map(s=>JSON.parse(s));
                let mStarHtml = '<div class="star-container">';
                uniqueStars.forEach(s => {
                    let shHtml = '';
                    if(s.shihua === 'lu') shHtml='🔴祿'; else if(s.shihua === 'quan') shHtml='🟢權'; else if(s.shihua === 'ke') shHtml='🔵科'; else if(s.shihua === 'ji') shHtml='⚫忌';
                    mStarHtml += `<div class="main-star">${s.name}${s.shihua?`<span class="shihua ${s.shihua}">${shHtml}</span>`:''}</div>`;
                });
                mStarHtml += '</div>';

                const pIdx = (mPos - dzIdx + 12) % 12;
                cell.innerHTML = `
                    <div class="flex flex-row h-full">
                        ${auxHtml}${mStarHtml}
                    </div>
                    <span class="dz-text">${DZ[dzIdx]}</span>
                    <span class="palace-tag ${pIdx === 0 ? 'is-ming' : ''}">${PALACES[pIdx]}</span>
                `;
                area.appendChild(cell);
            });

            // 中宮顯示
            document.getElementById('centerInfo').innerHTML = `
                <div class="mt-1"><p class="text-lg font-black text-slate-800">${name}</p><p class="text-[10px] text-indigo-600 font-bold mb-1">${personType} / ${hourDisplayName}</p></div>
                <div class="space-y-1 w-full text-left">
                    <div class="bg-white px-2 py-0.5 rounded border shadow-sm"><p class="text-[6px] text-slate-400 font-bold uppercase">國曆</p><p class="text-[10px] text-slate-700 font-mono font-bold">${solar.toYmd()}</p></div>
                    <div class="bg-white px-2 py-0.5 rounded border shadow-sm"><p class="text-[6px] text-slate-400 font-bold uppercase">農曆</p><p class="text-[10px] text-slate-700 font-bold">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p></div>
                </div>
                <div class="mt-2 inline-block px-4 py-0.5 bg-red-50 text-red-600 text-[10px] font-black rounded-full border border-red-200 shadow-sm">${WUXING[juice]}局</div>
            `;
            document.getElementById('chartView').classList.remove('hidden');
        });
    </script>
</body>
</html>
