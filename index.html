<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紫微斗數 PWA v1.9.9 封版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .chart-container { width: 100%; aspect-ratio: 1/1; background-color: #1e293b; border: 2px solid #0f172a; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; }
        .cell { background: white; position: relative; padding: 2px; display: flex; flex-direction: column; overflow: hidden; }
        .stars-wrapper { display: flex; flex-direction: row-reverse; height: 82%; overflow: hidden; gap: 3px; }
        .aux-star-container, .main-star-container { display: flex; flex-direction: row-reverse; gap: 2px; }
        .aux-star-box { display: flex; flex-direction: column; align-items: center; width: 10px; }
        .aux-star-text { writing-mode: vertical-rl; font-size: 0.5rem; line-height: 1.1; font-weight: bold; }
        .aux-star-box.ji .aux-star-text { color: #1e40af; }
        .aux-star-box.sha .aux-star-text { color: #ea580c; }
        .aux-star-box.lma .aux-star-text { color: #854d0e; }
        .main-star-box { display: flex; flex-direction: column; align-items: center; width: 14px; }
        .main-star-text { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.75rem; line-height: 1.1; font-family: 'Noto Serif TC', serif; }
        .shihua-tag { font-size: 0.4rem; color: white; padding: 0px 1px; border-radius: 2px; width: 9px; text-align: center; margin-top: 1px; }
        .shihua-lu { background: #be123c; } .shihua-quan { background: #15803d; } .shihua-ke { background: #1d4ed8; } .shihua-ji { background: #111827; }
        .cell-footer { position: absolute; bottom: 2px; left: 2px; right: 2px; display: flex; justify-content: space-between; align-items: flex-end; }
        .dz-text { font-size: 0.55rem; color: #94a3b8; font-weight: bold; }
        .palace-tag { font-size: 0.55rem; color: #6366f1; font-weight: 900; }
        .palace-tag.is-ming { color: #be123c; border-bottom: 1.5px solid #be123c; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #4f46e5; border-top: 3px solid #4f46e5; }
    </style>
</head>
<body class="pb-24">
    <main class="p-3 max-w-2xl mx-auto">
        <section id="page-chart" class="tab-content active">
            <div class="bg-white shadow-md rounded-2xl p-4 mb-4 border-t-4 border-indigo-600">
                <form id="ziweiForm" class="space-y-4">
                    <div class="grid grid-cols-4 gap-2">
                        <div class="col-span-2"><label class="block text-[10px] font-bold text-slate-400">姓名</label><input type="text" id="userName" placeholder="請輸入姓名" class="w-full border-b p-1 text-sm outline-none"></div>
                        <div><label class="block text-[10px] font-bold text-slate-400">性別</label><select id="gender" class="w-full border-b p-1 text-sm"><option value="1">男</option><option value="0">女</option></select></div>
                        <div><label class="block text-[10px] font-bold text-slate-400">曆法</label><select id="calendarType" class="w-full border-b p-1 text-sm"><option value="solar">國曆</option><option value="lunar">農曆</option></select></div>
                    </div>
                    <div class="grid grid-cols-12 gap-2 items-end">
                        <div class="col-span-7"><label class="block text-[10px] font-bold text-slate-400">出生日期與時辰</label><input type="date" id="birthDate" class="w-full border-b p-1 text-sm outline-none"></div>
                        <div class="col-span-5"><select id="birthHour" class="w-full border-b p-1 text-sm">
                            <option value="0">子(00-01)</option><option value="1">丑(01-03)</option><option value="2">寅(03-05)</option><option value="3">卯(05-07)</option><option value="4">辰(07-09)</option><option value="5">巳(09-11)</option><option value="6">午(11-13)</option><option value="7">未(13-15)</option><option value="8">申(15-17)</option><option value="9">酉(17-19)</option><option value="10">戌(19-21)</option><option value="11">亥(21-23)</option><option value="late-zi">子(23-00)</option>
                        </select></div>
                    </div>
                    <div class="flex gap-2"><button type="submit" class="flex-1 bg-indigo-700 text-white font-bold py-3 rounded-xl text-sm active:scale-95">執行排盤</button><button type="button" onclick="quickSave()" class="px-4 bg-emerald-500 text-white rounded-xl active:scale-95">💾</button></div>
                </form>
            </div>
            <div id="chartContainer" class="hidden"><div class="bg-slate-900 p-1 rounded-xl shadow-2xl"><div class="chart-container" id="mainChart"><div class="center-box" id="centerInfo"></div></div></div></div>
            <div class="mt-6 text-center text-[10px] text-slate-300">v1.9.9 穩定封版 | <button onclick="location.reload()" class="underline">介面重整</button></div>
        </section>

        <section id="page-data" class="tab-content">
            <div class="bg-white shadow-md rounded-2xl p-5 border-t-4 border-emerald-500 min-h-[400px]">
                <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold text-slate-700">紀錄管理</h2><div class="flex gap-2"><button onclick="exportData()" class="text-[10px] bg-slate-50 px-2 py-1 rounded border">匯出</button><button onclick="document.getElementById('importFile').click()" class="text-[10px] bg-slate-50 px-2 py-1 rounded border">匯入</button><input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)"></div></div>
                <input type="text" id="recordSearch" oninput="renderRecords()" placeholder="🔍 搜尋姓名..." class="w-full mb-4 p-2 text-sm bg-slate-50 rounded-lg outline-none border-b border-transparent focus:border-emerald-500 transition-all">
                <div id="recordList" class="space-y-1.5"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 pb-4 shadow-lg z-50">
        <button onclick="switchTab('chart')" class="nav-item active flex flex-col items-center justify-center flex-1" id="nav-chart"><span class="text-xl">☯️</span><span class="text-[10px] font-bold">排盤工具</span></button>
        <button onclick="switchTab('data')" class="nav-item flex flex-col items-center justify-center flex-1" id="nav-data"><span class="text-xl">👥</span><span class="text-[10px] font-bold">資料管理</span></button>
    </nav>

    <script>
        // ... (程式邏輯同 v1.9.9) ...
    </script>
    
    </body>
</html>
