<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紫微斗數 PWA v1.9.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        
        /* 命盤網格強化 */
        .chart-container { 
            width: 100%; aspect-ratio: 1/1; background-color: #1e293b; 
            border: 2px solid #0f172a; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px;
        }
        .cell { background: white; position: relative; padding: 1px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        
        /* 星曜排列優化：防止黏在一起 */
        .stars-wrapper { display: flex; flex-direction: row-reverse; height: 100%; overflow: hidden; gap: 2px; padding: 1px; }
        .aux-star-container { display: flex; flex-direction: column; flex-shrink: 0; width: 12px; gap: 1px;}
        .aux-star-text { writing-mode: vertical-rl; font-size: 0.55rem; line-height: 1; font-weight: bold; white-space: nowrap; }
        .aux-star-box.ji .aux-star-text { color: #1e40af; }
        .aux-star-box.sha .aux-star-text { color: #ea580c; }
        .aux-star-box.lma .aux-star-text { color: #854d0e; }
        
        .main-star-container { display: flex; flex-direction: row-reverse; gap: 1px; flex: 1; justify-content: flex-start; }
        .main-star-box { display: flex; flex-direction: column; align-items: center; min-width: 14px; }
        .main-star-text { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.8rem; line-height: 1; font-family: 'Noto Serif TC', serif; white-space: nowrap; }
        
        /* 四化標籤微縮化 */
        .shihua-tag { font-size: 0.4rem; color: white; padding: 0px 1px; border-radius: 2px; margin-top: 1px; width: 10px; text-align: center; font-weight: 900; }
        .shihua-lu { background: #be123c; } .shihua-quan { background: #15803d; } .shihua-ke { background: #1d4ed8; } .shihua-ji { background: #111827; }
        
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px; }
        .palace-tag { font-size: 0.6rem; color: white; padding: 1px 3px; border-radius: 2px; background: #6366f1; font-weight: bold; position: absolute; bottom: 2px; right: 2px;}
        .palace-tag.is-ming { background: #be123c; }
        .dz-text { font-size: 0.55rem; color: #94a3b8; position: absolute; bottom: 2px; left: 2px; font-weight: bold; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #4f46e5; border-top: 3px solid #4f46e5; }
    </style>
</head>
<body class="pb-28">

    <main class="p-3 max-w-2xl mx-auto">
        <section id="page-chart" class="tab-content active">
            <div class="bg-white shadow-md rounded-2xl p-4 mb-4 border-t-4 border-indigo-600">
                <form id="ziweiForm" class="space-y-4">
                    <div class="grid grid-cols-4 gap-2">
                        <div class="col-span-2"><label class="block text-[10px] font-bold text-slate-400">姓名</label><input type="text" id="userName" value="楊博元" class="w-full border-b p-1 text-sm outline-none"></div>
                        <div><label class="block text-[10px] font-bold text-slate-400">性別</label><select id="gender" class="w-full border-b p-1 text-sm"><option value="1">男</option><option value="0">女</option></select></div>
                        <div><label class="block text-[10px] font-bold text-slate-400">曆法</label><select id="calendarType" class="w-full border-b p-1 text-sm"><option value="solar">國</option><option value="lunar">農</option></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="birthDate" value="1989-10-01" class="w-full border-b p-1 text-sm outline-none">
                        <select id="birthHour" class="w-full border-b p-1 text-sm">
                            <option value="0">子(00-01)</option><option value="1">丑(01-03)</option><option value="2">寅(03-05)</option><option value="3">卯(05-07)</option><option value="4">辰(07-09)</option><option value="5">巳(09-11)</option><option value="6">午(11-13)</option><option value="7">未(13-15)</option><option value="8">申(15-17)</option><option value="9">酉(17-19)</option><option value="10">戌(19-21)</option><option value="11">亥(21-23)</option><option value="late-zi">子(23-00)</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" class="flex-1 bg-indigo-700 text-white font-bold py-3 rounded-xl text-sm active:scale-95">執行排盤</button>
                        <button type="button" onclick="quickSave()" class="px-4 bg-emerald-500 text-white rounded-xl active:scale-95">💾</button>
                    </div>
                </form>
            </div>
            
            <div id="chartContainer" class="hidden">
                <div class="bg-slate-900 p-1 rounded-xl shadow-2xl">
                    <div class="chart-container" id="mainChart">
                        <div class="center-box" id="centerInfo"></div>
                    </div>
                </div>
                <div class="mt-8 text-center text-[10px] text-slate-300">
                    <p>v1.9.3 | <button onclick="location.reload()" class="underline">強制刷新介面</button></p>
                </div>
            </div>
        </section>

        <section id="page-data" class="tab-content">
            <div class="bg-white shadow-md rounded-2xl p-5 border-t-4 border-emerald-500 min-h-[400px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-700">歷史紀錄</h2>
                    <div class="flex gap-1">
                        <button onclick="exportCSV()" class="text-[10px] bg-slate-50 px-2 py-1 rounded border">匯出</button>
                        <label class="text-[10px] bg-slate-50 px-2 py-1 rounded border cursor-pointer">匯入<input type="file" accept=".csv" onchange="importCSV(this)" class="hidden"></label>
                    </div>
                </div>
                <div id="recordList" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 pb-4 shadow-lg z-50">
        <button onclick="switchTab('chart')" class="nav-item active flex flex-col items-center justify-center flex-1" id="nav-chart"><span class="text-xl">☯️</span><span class="text-[10px] font-bold">排盤</span></button>
        <button onclick="switchTab('data')" class="nav-item flex flex-col items-center justify-center flex-1" id="nav-data"><span class="text-xl">👥</span><span class="text-[10px] font-bold">客戶</span></button>
    </nav>

    <script>
        // --- 核心邏輯保持 v1.9.2 之穩定性 ---
        const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'], DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'], PALACES=["命宮","兄弟","夫妻","子女","財帛","疾厄","遷移","交友","官祿","田宅","福德","父母"];
        function switchTab(t){ document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active')); document.getElementById(`page-${t}`).classList.add('active'); document.getElementById(`nav-${t}`).classList.add('active'); if(t==='data') renderRecords(); }
        function getRecords(){ return JSON.parse(localStorage.getItem('zwRecords')||'[]'); }
        function quickSave(){ const r=getRecords(), hs=document.getElementById('birthHour'); r.unshift({name:document.getElementById('userName').value||'未命名', gender:document.getElementById('gender').value, cal:document.getElementById('calendarType').value, date:document.getElementById('birthDate').value, hour:hs.value, hName:hs.options[hs.selectedIndex].text}); localStorage.setItem('zwRecords', JSON.stringify(r)); alert('存入成功'); }
        function renderRecords(){ const r=getRecords(), list=document.getElementById('recordList'); list.innerHTML=r.length===0?'<p class="text-center py-10 text-slate-400 text-xs">尚無資料</p>':r.map((d,i)=>`<div class="bg-slate-50 p-3 rounded-xl flex justify-between items-center border border-slate-100 text-xs"><div onclick="loadAndSwitch(${i})" class="flex-1 cursor-pointer font-bold">${d.name} <span class="text-slate-400 font-normal">(${d.date})</span></div><button onclick="deleteRecord(${i})" class="text-red-300 px-2">✕</button></div>`).join(''); }
        function loadAndSwitch(i){ const d=getRecords()[i]; document.getElementById('userName').value=d.name; document.getElementById('gender').value=d.gender; document.getElementById('calendarType').value=d.cal; document.getElementById('birthDate').value=d.date; document.getElementById('birthHour').value=d.hour; switchTab('chart'); document.getElementById('ziweiForm').dispatchEvent(new Event('submit')); }
        function deleteRecord(i){ if(confirm('刪除紀錄？')){ const r=getRecords(); r.splice(i,1); localStorage.setItem('zwRecords',JSON.stringify(r)); renderRecords(); } }
        function exportCSV(){ const r=getRecords(); let c="姓名,性別,曆法,日期,時辰\n"; r.forEach(d=>c+=`${d.name},${d.gender},${d.cal},${d.date},${d.hour}\n`); const b=new Blob(["\ufeff"+c],{type:'text/csv'}); const l=document.createElement("a"); l.href=URL.createObjectURL(b); l.download=`紫微客戶.csv`; l.click(); }
        function importCSV(i){ const f=i.files[0], rd=new FileReader(); rd.onload=function(e){ const ln=e.target.result.split('\n').slice(1), r=getRecords(); ln.forEach(l=>{ const [n,g,c,d,h]=l.split(','); if(n)r.push({name:n,gender:g,cal:c,date:d,hour:h,hName:'匯入'}); }); localStorage.setItem('zwRecords',JSON.stringify(r)); renderRecords(); }; rd.readAsText(f); }

        document.getElementById('ziweiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name=document.getElementById('userName').value, genderVal=document.getElementById('gender').value, dateStr=document.getElementById('birthDate').value, hVal=document.getElementById('birthHour').value, isL=document.getElementById('calendarType').value==='lunar';
            let [y,m,d]=dateStr.split('-').map(Number), solar, lunar;
            if(isL){ lunar=Lunar.fromYmd(y,m,d); if(hVal==="late-zi")lunar=lunar.next(1); solar=lunar.getSolar(); }
            else{ solar=Solar.fromYmd(y,m,d); if(hVal==="late-zi")solar=solar.next(1); lunar=solar.getLunar(); }
            const lM=lunar.getMonth(), lD=lunar.getDay(), gan=lunar.getYearGan(), zhi=lunar.getYearZhi(), yTG=TG.indexOf(gan), yDZ=DZ.indexOf(zhi), hIdx=(hVal==="late-zi")?0:parseInt(hVal);
            const mPos=(2+(lM-1)-hIdx+12)%12, mTG=((yTG%5)*2+2+(mPos-2+12)%12)%10;
            const juice=(function(tg,dz){const tn=Math.floor(tg/2)+1, dn=(Math.floor(dz/2)%3)+1; let n=tn+dn; if(n>5)n-=5; return {1:3,2:4,3:2,4:6,5:5}[n]||2;})(mTG, mPos);
            const zwP=(function(d,j){let q=d%j===0?d/j:Math.floor(d/j)+1, r=(q*j)-d, p=(q+1)%12; return r===0?p:(r%2!==0?(p-r+12)%12:(p+r)%12);})(lD, juice);
            const tfP=(4-zwP+12)%12;
            let mMap=Array.from({length:12},()=>[]), aMap=Array.from({length:12},()=>[]);
            const shConf=[['廉貞','破軍','武曲','太陽'],['天機','天梁','紫微','太陰'],['天同','天機','文昌','廉貞'],['太陰','天同','天機','巨門'],['貪狼','太陰','右弼','天機'],['武曲','貪狼','天梁','文曲'],['太陽','武曲','太陰','天同'],['巨門','太陽','文曲','文昌'],['天梁','紫微','左輔','武曲'],['破軍','巨門','天機','貪狼']];
            const curSH=shConf[yTG];
            const addM=(p,s)=>{ if(s)mMap[(p+12)%12].push({name:s, sh:curSH.indexOf(s)}); };
            ["紫微","天機","","太陽","武曲","天同","","","廉貞"].forEach((s,i)=>addM(zwP-i,s));
            ["天府","太陰","貪狼","巨門","天相","天梁","七殺","","","","破軍"].forEach((s,i)=>addM(tfP+i,s));
            const addA=(p,n,t)=>{ aMap[(p+12)%12].push({name:n,type:t,sh:curSH.indexOf(n)}); };
            addA(4+lM-1,'左輔','ji'); addA(10-lM+1,'右弼','ji'); addA(10-hIdx,'文昌','ji'); addA(4+hIdx,'文曲','ji');
            const ky={'甲':[1,7],'乙':[0,8],'丙':[11,9],'丁':[11,9],'戊':[1,7],'己':[0,8],'庚':[1,7],'辛':[6,2],'壬':[3,5],'癸':[3,5]}[gan];
            if(ky){addA(ky[0],'天魁','ji'); addA(ky[1],'天鉞','ji');}
            addA(11-hIdx,'地空','sha'); addA(11+hIdx,'地劫','sha');
            const lc=[2,3,5,6,5,6,8,9,11,0][yTG]; addA(lc,'祿存','lma'); addA(lc+1,'擎羊','sha'); addA(lc-1,'陀羅','sha');
            addA([2,11,8,5][yDZ%4],'天馬','lma');
            let hs=0, ls=0; if(['寅','午','戌'].includes(zhi)){hs=1;ls=3;} else if(['申','子','辰'].includes(zhi)){hs=2;ls=10;} else if(['巳','酉','丑'].includes(zhi)){hs=3;ls=10;} else {hs=9;ls=10;}
            addA(hs+hIdx,'火星','sha'); addA(ls+hIdx,'鈴星','sha');
            
            const area=document.getElementById('mainChart'); area.querySelectorAll('.cell').forEach(c=>c.remove());
            [5,6,7,8,4,-1,-1,9,3,-1,-1,10,2,1,0,11].forEach(dzI=>{
                if(dzI===-1)return;
                const cell=document.createElement('div'); cell.className='cell';
                let aH='<div class="aux-star-container">', mH='<div class="main-star-container">';
                const shL=['祿','權','科','忌'], shC=['shihua-lu','shihua-quan','shihua-ke','shihua-ji'];
                aMap[dzI].forEach(s=> aH+=`<div class="aux-star-box ${s.type}"><span class="aux-star-text">${s.name}</span>${s.sh!==-1?`<span class="shihua-tag ${shC[s.sh]}">${shL[s.sh]}</span>`:''}</div>`);
                mMap[dzI].forEach(s=> mH+=`<div class="main-star-box"><span class="main-star-text">${s.name}</span>${s.sh!==-1?`<span class="shihua-tag ${shC[s.sh]}">${shL[s.sh]}</span>`:''}</div>`);
                const pIdx=(mPos-dzI+12)%12;
                cell.innerHTML=`<div class="stars-wrapper">${aH}</div>${mH}</div><span class="dz-text">${DZ[dzI]}</span><span class="palace-tag ${pIdx===0?'is-ming':''}">${PALACES[pIdx]}</span>`;
                area.appendChild(cell);
            });
            document.getElementById('centerInfo').innerHTML=`<p class="text-xs font-black">${name}</p><p class="text-[9px] text-indigo-500 font-bold">${(yTG%2==0?'陽':'陰')+(genderVal=='1'?'男':'女')}</p><div class="w-full text-[8px] space-y-0.5 mt-1"><p class="bg-white px-1 rounded border border-slate-100">國: ${solar.toYmd()}</p><p class="bg-white px-1 rounded border border-slate-100">農: ${lunar.getYearInGanZhi()}${lunar.getMonthInChinese()}${lunar.getDayInChinese()}</p></div><div class="mt-1 px-2 bg-red-50 text-red-600 text-[8px] font-black rounded-full border border-red-100">${juice}局</div>`;
            document.getElementById('chartContainer').classList.remove('hidden');
            window.scrollTo({top:document.getElementById('chartContainer').offsetTop-10, behavior:'smooth'});
        });
    </script>
</body>
</html>
