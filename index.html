<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微排盤 v1.0.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f3f4f6; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #333; width: 100%; max-width: 500px; aspect-ratio: 1/1; margin: 0 auto; }
        .cell { background: white; position: relative; padding: 4px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #faf5ff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.8rem; line-height: 1.1; }
        .palace-tag { font-size: 0.65rem; color: white; padding: 2px 4px; border-radius: 2px; align-self: flex-end; }
        .dz-text { font-size: 0.6rem; color: #94a3b8; position: absolute; bottom: 2px; left: 4px; }
    </style>
</head>
<body class="p-2">

    <div class="max-w-md mx-auto bg-white shadow-xl rounded-2xl p-5 mb-4">
        <h1 class="text-2xl font-bold text-center text-purple-900 ziwei-font">紫微排盤 <span class="text-xs font-mono text-gray-400">v1.0.7</span></h1>
        
        <form id="ziweiForm" class="grid grid-cols-2 gap-3 text-sm mt-4">
            <input type="text" id="userName" placeholder="姓名" required class="border p-2 rounded-lg">
            <select id="gender" class="border p-2 rounded-lg"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
            <input type="date" id="birthDate" required class="col-span-2 border p-2 rounded-lg">
            <select id="birthHour" class="col-span-2 border p-2 rounded-lg">
                <option value="late-zi">晚子 (23:00 - 00:00) 算隔日</option>
                <option value="0">早子 (00:00 - 01:00)</option>
                <option value="1">丑 (01:00 - 03:00)</option>
                <option value="2">寅 (03:00 - 05:00)</option>
                <option value="3">卯 (05:00 - 07:00)</option>
                <option value="4">辰 (07:00 - 09:00)</option>
                <option value="5">巳 (09:00 - 11:00)</option>
                <option value="6">午 (11:00 - 13:00)</option>
                <option value="7">未 (13:00 - 15:00)</option>
                <option value="8">申 (15:00 - 17:00)</option>
                <option value="9">酉 (17:00 - 19:00)</option>
                <option value="10">戌 (19:00 - 21:00)</option>
                <option value="11">亥 (21:00 - 23:00)</option>
            </select>
            <button type="submit" class="col-span-2 bg-purple-700 text-white font-bold py-3 rounded-xl active:scale-95">執行排盤</button>
        </form>
    </div>

    <div id="chartView" class="hidden"><div class="chart-grid" id="mainChart"><div class="center-box" id="centerInfo"></div></div></div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const ZIWEI_GRP = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
        const TIANFU_GRP = ["天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "", "", "", "", "破軍"];

        document.getElementById('ziweiForm').addEventListener('submit', function(e) { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            
            let d = new Date(dateStr);
            let hIdx;

            // --- 精確子時判定邏輯 ---
            if (hVal === "late-zi") {
                // 如果選晚子，日期加一天，但時辰索引依然是子 (0)
                d.setDate(d.getDate() + 1);
                hIdx = 0;
            } else {
                hIdx = parseInt(hVal);
            }

            let lunar = Solar.fromDate(d).getLunar();
            let lMonth = lunar.getMonth(); 
            let lDay = lunar.getDay();
            let yTGIdx = (lunar.getYear() - 4) % 10;

            // 命宮計算：(2 + 月份偏移 - 時辰偏移)
            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;

            const jTable = [[4,4,3,3,5,5,4,4,3,3,5,5],[2,2,6,6,3,3,2,2,6,6,3,3],[5,5,4,4,2,2,5,5,4,4,2,2],[3,3,5,5,4,4,3,3,5,5,4,4],[6,6,2,2,5,5,6,6,2,2,5,5]];
            let juice = jTable[yTGIdx % 5][mPos];

            let zPos = calcZiwei(juice, lDay);
            let fPos = (4 - zPos + 12) % 12;

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];

            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let stars = [];
                ZIWEI_GRP.forEach((v, i) => { if(v && (zPos - i + 12) % 12 === dzIdx) stars.push(v); });
                TIANFU_GRP.forEach((v, i) => { if(v && (fPos + i) % 12 === dzIdx) stars.push(v); });

                cell.innerHTML = `
                    <div class="flex flex-row-reverse h-14">${stars.map(x=>`<span class="main-star">${x}</span>`).join('')}</div>
                    <span class="dz-text">${DZ[dzIdx]}</span>
                    <span class="palace-tag ${pIdx===0?'bg-red-600 font-bold':'bg-purple-500'}">${PALACES[pIdx]}</span>
                `;
                area.insertBefore(cell, area.children[gIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `
                <p class="font-bold text-lg text-purple-950">${name}</p>
                <p class="text-[10px] text-gray-500">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p>
                <div class="text-red-600 text-xs font-bold mt-2">局數：${juice}</div>
            `;
            document.getElementById('chartView').classList.remove('hidden');
        }

        function calcZiwei(j, d) {
            let q = Math.ceil(d/j), r = d%j;
            let s = (q+1)%12;
            if(r===0) return (s+1)%12;
            return (r%2===0) ? (s+r)%12 : (s-r+12)%12;
        }
    </script>
</body>
</html>
