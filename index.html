<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微通用修正版 v1.1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f8fafc; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #475569; width: 100%; max-width: 600px; aspect-ratio: 1/1; margin: 0 auto; border: 2px solid #1e293b; }
        .cell { background: white; position: relative; padding: 2px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.85rem; line-height: 1; margin-left: 1px; }
        .small-star { writing-mode: vertical-rl; font-size: 0.65rem; line-height: 1; margin-left: 1px; }
        .lucky { color: #15803d; }
        .bad { color: #64748b; }
        .si-hua { color: #ea580c; font-size: 0.55rem; border: 1px solid #ea580c; border-radius: 2px; padding: 0 1px; margin-top: 2px; }
        .palace-tag { font-size: 0.65rem; color: white; padding: 2px 4px; border-radius: 2px; align-self: flex-end; }
        .dz-text { font-size: 0.6rem; color: #94a3b8; position: absolute; bottom: 2px; left: 4px; }
    </style>
</head>
<body class="p-2 sm:p-6">

    <div class="max-w-md mx-auto bg-white shadow-2xl rounded-3xl p-6 mb-6 border-t-8 border-purple-600">
        <h1 class="text-2xl font-bold text-center text-slate-800 ziwei-font mb-4">紫微斗數 PWA</h1>
        
        <form id="ziweiForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="userName" placeholder="姓名" required class="border-b-2 p-2 outline-none focus:border-purple-500 transition-colors">
                <select id="gender" class="border-b-2 p-2 outline-none"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="date" id="birthDate" required class="border-b-2 p-2 outline-none">
                <select id="birthHour" class="border-b-2 p-2 outline-none">
                    <option value="late-zi">晚子 (23:00-00:00) 算隔日</option>
                    <option value="0">早子 (00:00-01:00)</option><option value="1">丑</option><option value="2">寅</option>
                    <option value="3">卯</option><option value="4">辰</option><option value="5">巳</option>
                    <option value="6">午</option><option value="7">未</option><option value="8">申</option>
                    <option value="9">酉</option><option value="10">戌</option><option value="11">亥</option>
                </select>
            </div>
            <div class="flex flex-col gap-2">
                <button type="submit" class="w-full bg-purple-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform">立即排盤</button>
                <div class="flex gap-2">
                    <button type="button" onclick="saveToFriendList()" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-sm">儲存好友</button>
                    <button type="button" onclick="forceReload()" class="flex-1 bg-gray-200 text-gray-600 py-2 rounded-lg text-sm italic">強制更新</button>
                </div>
            </div>
        </form>

        <div id="friendListSection" class="mt-6 pt-4 border-t border-slate-100 hidden">
            <div id="friendList" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <div id="chartView" class="hidden text-center pb-10">
        <div id="captureArea" class="inline-block p-2 bg-slate-800 rounded-lg shadow-2xl">
            <div class="chart-grid" id="mainChart">
                <div class="center-box" id="centerInfo"></div>
            </div>
        </div>
        <button onclick="exportImage()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-full shadow-lg font-bold">下載命盤圖片</button>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const SIHUA_TABLE = { '甲':['廉','破','武','陽'], '乙':['機','梁','紫','陰'], '丙':['同','機','昌','廉'], '丁':['月','同','機','巨'], '戊':['貪','月','弼','機'], '己':['武','貪','梁','曲'], '庚':['陽','武','府','同'], '辛':['巨','陽','曲','昌'], '壬':['梁','紫','左','武'], '癸':['破','巨','陰','貪'] };
        const STAR_MAP = {'紫':'紫微','機':'天機','陽':'太陽','武':'武曲','同':'天同','廉':'廉貞','府':'天府','月':'太陰','貪':'貪狼','巨':'巨門','相':'天相','梁':'天梁','殺':'七殺','破':'破軍','昌':'文昌','曲':'文曲','左':'左輔','弼':'右弼'};
        const WUXING_MAP = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        window.onload = updateFriendListDisplay;
        function forceReload() { localStorage.clear(); window.location.reload(true); }
        function saveToFriendList() {
            const name = document.getElementById('userName').value;
            if(!name) return;
            const data = { name, gender: document.getElementById('gender').value, date: document.getElementById('birthDate').value, hour: document.getElementById('birthHour').value };
            let list = JSON.parse(localStorage.getItem('ziwei_friends') || '[]');
            list = list.filter(i => i.name !== name);
            list.push(data);
            localStorage.setItem('ziwei_friends', JSON.stringify(list));
            updateFriendListDisplay();
            alert("已儲存好友！");
        }

        function updateFriendListDisplay() {
            const list = JSON.parse(localStorage.getItem('ziwei_friends') || '[]');
            const section = document.getElementById('friendListSection');
            if(list.length === 0) return section.classList.add('hidden');
            section.classList.remove('hidden');
            document.getElementById('friendList').innerHTML = list.map(f => `<button onclick='loadFriend(${JSON.stringify(f)})' class="px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full border border-slate-200">${f.name}</button>`).join('');
        }

        function loadFriend(f) {
            document.getElementById('userName').value = f.name;
            document.getElementById('gender').value = f.gender;
            document.getElementById('birthDate').value = f.date;
            document.getElementById('birthHour').value = f.hour;
            render();
        }

        document.getElementById('ziweiForm').addEventListener('submit', (e) => { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            if(!dateStr) return;

            let [y, m, d] = dateStr.split('-').map(Number);
            let hIdx;
            if (hVal === "late-zi") {
                let nextDay = Solar.fromYmd(y, m, d).next(1);
                y = nextDay.getYear(); m = nextDay.getMonth(); d = nextDay.getDay();
                hIdx = 0;
            } else {
                hIdx = parseInt(hVal);
            }

            let lunar = Solar.fromYmd(y, m, d).getLunar();
            let lMonth = lunar.getMonth(), lDay = lunar.getDay(), yTG = lunar.getYearGan();
            let yTGIdx = (lunar.getYear() - 4) % 10;

            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;
            const jTable = [[4,4,3,3,5,5,4,4,3,3,5,5],[2,2,6,6,3,3,2,2,6,6,3,3],[5,5,4,4,2,2,5,5,4,4,2,2],[3,3,5,5,4,4,3,3,5,5,4,4],[6,6,2,2,5,5,6,6,2,2,5,5]];
            let juice = jTable[yTGIdx % 5][mPos];
            let zPos = calcZiwei(juice, lDay), fPos = (4 - zPos + 12) % 12;

            let stars = Array.from({length:12}, () => []);
            ["紫微","天機","","太陽","武曲","天同","","","廉貞"].forEach((s,i)=>{ if(s) stars[(zPos-i+12)%12].push({n:s, t:'main'}); });
            ["天府","太陰","貪狼","巨門","天相","天梁","七殺"].forEach((s,i)=>{ stars[(fPos-i+12)%12].push({n:s, t:'main'}); });
            stars[(fPos+9)%12].push({n:"破軍", t:'main'});
            
            stars[(10+hIdx)%12].push({n:"文曲", t:'lucky'});
            stars[(10-hIdx+12)%12].push({n:"文昌", t:'lucky'});
            stars[(2+(lMonth-1))%12].push({n:"左輔", t:'lucky'});
            stars[(10-(lMonth-1)+12)%12].push({n:"右弼", t:'lucky'});
            const kuiYue = {'甲':[7,9],'乙':[8,10],'丙':[11,1],'丁':[11,1],'戊':[7,9],'己':[8,10],'庚':[7,9],'辛':[6,2],'壬':[3,5],'癸':[3,5]};
            kuiYue[yTG].forEach((p,i)=>stars[p].push({n:i===0?"天魁":"天鉞", t:'lucky'}));
            const yangTuo = {'甲':4,'乙':5,'丙':7,'丁':8,'戊':7,'己':8,'庚':10,'辛':11,'壬':1,'癸':2};
            stars[yangTuo[yTG]].push({n:"擎羊", t:'bad'});
            stars[(yangTuo[yTG]-2+12)%12].push({n:"陀羅", t:'bad'});
            stars[(hIdx+10)%12].push({n:"地劫", t:'bad'});
            stars[(10-hIdx+12)%12].push({n:"地空", t:'bad'});
            
            SIHUA_TABLE[yTG].forEach((short, i) => {
                let full = STAR_MAP[short];
                stars.forEach(p => p.forEach(s => { if(s.n === full) s.sh = ["祿","權","科","忌"][i]; }));
            });

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];

            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let sHtml = stars[dzIdx].map(s => `<div class="${s.t==='main'?'main-star':'small-star'} ${s.t==='lucky'?'lucky':(s.t==='bad'?'bad':'')}">${s.n}${s.sh ? `<br><span class="si-hua">${s.sh}</span>` : ''}</div>`).join('');
                cell.innerHTML = `<div class="flex flex-row-reverse h-24 overflow-hidden">${sHtml}</div><span class="dz-text">${DZ[dzIdx]}</span><span class="palace-tag ${pIdx===0?'bg-red-600 font-bold':'bg-purple-500'}">${PALACES[pIdx]}</span>`;
                area.insertBefore(cell, area.children[gIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `<p class="font-bold text-lg ziwei-font">${name}</p><p class="text-[10px] text-gray-500 font-medium">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p><div class="inline-block px-3 py-1 bg-red-50 text-red-600 text-xs font-bold rounded-full mt-2 border border-red-100">${WUXING_MAP[juice]}</div>`;
            document.getElementById('chartView').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function calcZiwei(j, d) { let q = Math.ceil(d/j), r = d%j, s = (q+1)%12; return (r===0) ? (s+1)%12 : (r%2===0) ? (s+r)%12 : (s-r+12)%12; }
        function exportImage() { html2canvas(document.getElementById('captureArea')).then(canvas => { const link = document.createElement('a'); link.download = `${document.getElementById('userName').value}_命盤.png`; link.href = canvas.toDataURL(); link.click(); }); }
    </script>
</body>
</html>
