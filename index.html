<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數 PWA v1.7.0 (天府星系版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-container { 
            width: 100%; aspect-ratio: 1/1; background-color: #334155; 
            border: 4px solid #1e293b; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 2px;
        }
        .cell { background: white; position: relative; padding: 4px; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; }
        .star-container { display: flex; flex-direction: row-reverse; height: 85%; overflow: hidden; gap: 2px; padding-top: 2px; }
        /* 主星樣式：紫微星系與天府星系統一紅色 */
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 1.05rem; line-height: 1; letter-spacing: 0.05rem; font-family: 'Noto Serif TC', serif; }
        
        .center-box { 
            grid-column: 2 / 4; grid-row: 2 / 4; background: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            text-align: center; padding: 8px; border: 1px inset #cbd5e1;
        }
        .palace-tag { font-size: 0.75rem; color: white; padding: 2px 6px; border-radius: 4px; background: #6366f1; font-weight: bold; align-self: flex-end; }
        .palace-tag.is-ming { background: #be123c; transform: scale(1.1); }
        .dz-text { font-size: 0.7rem; color: #94a3b8; position: absolute; bottom: 4px; left: 6px; font-weight: bold; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-3xl p-6 mb-6 border-t-8 border-indigo-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 ziwei-font">紫微斗數 PWA</h1>
            <span class="text-xs font-mono text-indigo-400 bg-indigo-50 px-2 py-1 rounded">v1.7.0</span>
        </div>
        
        <form id="ziweiForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-xs font-bold text-slate-400 mb-1">姓名</label><input type="text" id="userName" value="楊博元" required class="w-full border-b-2 p-1 outline-none bg-slate-50"></div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">性別</label>
                <select id="gender" class="w-full border-b-2 p-1 outline-none bg-slate-50">
                    <option value="1">男</option><option value="0">女</option>
                </select>
            </div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">曆法選擇</label><select id="calendarType" class="w-full border-b-2 p-1 outline-none bg-slate-50"><option value="solar">國曆 (公曆)</option><option value="lunar">農曆 (陰曆)</option></select></div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">出生日期</label><input type="date" id="birthDate" value="1989-10-01" required class="w-full border-b-2 p-1 outline-none bg-slate-50"></div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 mb-1">出生時辰</label>
                <select id="birthHour" class="w-full border-b-2 p-1 outline-none bg-slate-50">
                    <option value="0">00:00 - 01:00 (早子時)</option><option value="1">01:00 - 03:00 (丑時)</option><option value="2">03:00 - 05:00 (寅時)</option><option value="3">05:00 - 07:00 (卯時)</option><option value="4">07:00 - 09:00 (辰時)</option><option value="5">09:00 - 11:00 (巳時)</option><option value="6">11:00 - 13:00 (午時)</option><option value="7">13:00 - 15:00 (未時)</option><option value="8">15:00 - 17:00 (申時)</option><option value="9">17:00 - 19:00 (酉時)</option><option value="10">19:00 - 21:00 (戌時)</option><option value="11">21:00 - 23:00 (亥時)</option><option value="late-zi">23:00 - 00:00 (晚子時)</option>
                </select>
            </div>
            <div class="md:col-span-2 flex flex-col gap-3 mt-4">
                <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all text-lg">執行排盤</button>
                <button type="button" onclick="location.reload()" class="w-full bg-slate-200 text-slate-600 py-2 rounded-xl text-sm hover:bg-slate-300">強制更新</button>
            </div>
        </form>
    </div>

    <div id="chartView" class="hidden max-w-2xl mx-auto">
        <div class="bg-slate-900 p-1 md:p-4 rounded-xl shadow-2xl overflow-hidden">
            <div class="chart-container" id="mainChart"><div class="center-box" id="centerInfo"></div></div>
        </div>
    </div>

    <script>
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const genderVal = document.getElementById('gender').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            const hourSelect = document.getElementById('birthHour');
            const hourDisplayName = hourSelect.options[hourSelect.selectedIndex].text.match(/\((.*?)\)/)[1];
            
            const isLunarInput = document.getElementById('calendarType').value === 'lunar';
            let [y, m, d] = dateStr.split('-').map(Number);
            let solar, lunar;

            if (isLunarInput) {
                lunar = Lunar.fromYmd(y, m, d);
                if (hVal === "late-zi") lunar = lunar.next(1);
                solar = lunar.getSolar();
            } else {
                solar = Solar.fromYmd(y, m, d);
                if (hVal === "late-zi") solar = solar.next(1);
                lunar = solar.getLunar();
            }

            const lMonth = lunar.getMonth();
            const lDay = lunar.getDay();
            const yTGIdx = TG.indexOf(lunar.getYearGan());
            const hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);
            const personType = (yTGIdx % 2 === 0 ? "陽" : "陰") + (genderVal === "1" ? "男" : "女");

            // 1. 宮位定位
            const mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;
            const startTGIdx = (yTGIdx % 5) * 2 + 2; 
            const mTGIdx = (startTGIdx + (mPos - 2 + 12) % 12) % 10;
            const juice = (function(tg, dz){
                const tn = Math.floor(tg/2)+1, dn = (Math.floor(dz/2)%3)+1;
                let n = tn+dn; if(n>5) n-=5;
                return {1:3, 2:4, 3:2, 4:6, 5:5}[n];
            })(mTGIdx, mPos);

            // 2. 安紫微星 (借數法)
            function getZw(d, j) {
                let q = d%j===0 ? d/j : Math.floor(d/j)+1, r = (q*j)-d;
                let p = (q+1)%12;
                return r===0 ? p : (r%2!==0 ? (p-r+12)%12 : (p+r)%12);
            }
            const zwPos = getZw(lDay, juice);

            // 3. 星曜佈局地圖
            let starMap = Array.from({length: 12}, () => []);

            // 紫微星系 (逆時針)
            const zwS = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
            zwS.forEach((s, i) => { if(s) starMap[(zwPos-i+12)%12].push(s); });

            // 天府星系 (順時針)
            const tfPos = (4 - zwPos + 12) % 12;
            const tfS = ["天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "", "", "", "破軍"];
            tfS.forEach((s, i) => { if(s) starMap[(tfPos+i)%12].push(s); });

            // 4. 渲染
            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const gridOrder = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            
            gridOrder.forEach((dzIdx) => {
                if (dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                const pIdx = (mPos - dzIdx + 12) % 12;
                // 去重並生成 HTML (避免紫微天府同宮時重複顯示)
                const uniqueStars = [...new Set(starMap[dzIdx])];
                let sHtml = uniqueStars.map(s => `<div class="main-star">${s}</div>`).join('');
                
                cell.innerHTML = `
                    <div class="star-container">${sHtml}</div>
                    <span class="dz-text">${DZ[dzIdx]}</span>
                    <span class="palace-tag ${pIdx === 0 ? 'is-ming' : ''}">${PALACES[pIdx]}</span>
                `;
                area.appendChild(cell);
            });

            document.getElementById('centerInfo').innerHTML = `
                <div class="mt-1"><p class="text-lg font-black text-slate-800">${name}</p><p class="text-[10px] text-indigo-600 font-bold mb-2">${personType} / ${hourDisplayName}</p></div>
                <div class="space-y-1 w-full text-left">
                    <div class="bg-white px-2 py-1 rounded border shadow-sm"><p class="text-[7px] text-slate-400 font-bold uppercase">SOLAR 國曆</p><p class="text-[11px] text-slate-700 font-mono font-bold">${solar.toYmd()}</p></div>
                    <div class="bg-white px-2 py-1 rounded border shadow-sm"><p class="text-[7px] text-slate-400 font-bold uppercase">LUNAR 農曆</p><p class="text-[11px] text-slate-700 font-bold">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p></div>
                </div>
                <div class="mt-3 inline-block px-5 py-1 bg-red-50 text-red-600 text-xs font-black rounded-full border border-red-200 shadow-sm">${WUXING[juice]}</div>
            `;
            document.getElementById('chartView').classList.remove('hidden');
        });
    </script>
</body>
</html>
