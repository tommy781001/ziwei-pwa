<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зҙ«еҫ® PWA v1.1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f8fafc; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #1e293b; width: 100%; max-width: 600px; aspect-ratio: 1/1; margin: 0 auto; border: 2px solid #0f172a; }
        .cell { background: white; position: relative; padding: 2px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.85rem; line-height: 1; margin-left: 1px; }
        .small-star { writing-mode: vertical-rl; font-size: 0.65rem; line-height: 1; margin-left: 1px; }
        .lucky { color: #15803d; } .bad { color: #64748b; }
        .si-hua { color: #ea580c; font-size: 0.55rem; border: 1px solid #ea580c; border-radius: 2px; padding: 0 1px; margin-top: 2px; background: #fff7ed; }
        .palace-tag { font-size: 0.65rem; color: white; padding: 2px 4px; border-radius: 2px; align-self: flex-end; }
        .dz-text { font-size: 0.6rem; color: #94a3b8; position: absolute; bottom: 2px; left: 4px; font-weight: bold; }
    </style>
</head>
<body class="p-2 sm:p-6">

    <div class="max-w-md mx-auto bg-white shadow-2xl rounded-3xl p-6 mb-6 border-t-8 border-indigo-600">
        <h1 class="text-2xl font-bold text-center text-slate-800 ziwei-font mb-4">зҙ«еҫ®ж–—ж•ё PWA <span class="text-xs text-indigo-400 font-mono">v1.1.7</span></h1>
        
        <form id="ziweiForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="userName" placeholder="е§“еҗҚ" required class="border-b-2 p-2 outline-none focus:border-indigo-500">
                <select id="gender" class="border-b-2 p-2 outline-none"><option value="1">д№ҫйҖ  (з”·)</option><option value="0">еқӨйҖ  (еҘі)</option></select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="date" id="birthDate" required class="border-b-2 p-2 outline-none">
                <select id="birthHour" class="border-b-2 p-2 outline-none">
                    <option value="late-zi">жҷҡеӯҗ (23:00-00:00) з®—йҡ”ж—Ҙ</option>
                    <option value="0">ж—©еӯҗ (00:00-01:00)</option><option value="1">дё‘</option><option value="2">еҜ…</option>
                    <option value="3">еҚҜ</option><option value="4">иҫ°</option><option value="5">е·і</option>
                    <option value="6">еҚҲ</option><option value="7">жңӘ</option><option value="8">з”і</option>
                    <option value="9">й…ү</option><option value="10">жҲҢ</option><option value="11">дәҘ</option>
                </select>
            </div>
            <div class="flex flex-col gap-2">
                <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform">з«ӢеҚіжҺ’зӣӨ</button>
                <div class="flex gap-2">
                    <button type="button" onclick="saveToFriendList()" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-sm">е„ІеӯҳеҘҪеҸӢ</button>
                    <button type="button" onclick="forceReload()" class="flex-1 bg-gray-200 text-gray-600 py-2 rounded-lg text-sm italic">еј·еҲ¶жӣҙж–°</button>
                </div>
            </div>
        </form>

        <div id="friendListSection" class="mt-6 pt-4 border-t border-slate-100 hidden">
            <div id="friendList" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <div id="chartView" class="hidden text-center pb-10">
        <div id="captureArea" class="inline-block p-2 bg-slate-800 rounded-lg shadow-2xl">
            <div class="chart-grid" id="mainChart"><div class="center-box" id="centerInfo"></div></div>
        </div>
        <button onclick="exportImage()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-full shadow-lg font-bold">дёӢијүе‘ҪзӣӨең–зүҮ</button>
    </div>

    <script>
        const DZ = ['еӯҗ', 'дё‘', 'еҜ…', 'еҚҜ', 'иҫ°', 'е·і', 'еҚҲ', 'жңӘ', 'з”і', 'й…ү', 'жҲҢ', 'дәҘ'];
        const PALACES = ["е‘Ҫе®®", "е…„ејҹ", "еӨ«еҰ»", "еӯҗеҘі", "иІЎеёӣ", "з–ҫеҺ„", "йҒ·з§»", "дәӨеҸӢ", "е®ҳзҘҝ", "з”°е®…", "зҰҸеҫ·", "зҲ¶жҜҚ"];
        const SIHUA_TABLE = { 'з”І':['е»ү','з ҙ','жӯҰ','йҷҪ'], 'д№ҷ':['ж©ҹ','жўҒ','зҙ«','йҷ°'], 'дёҷ':['еҗҢ','ж©ҹ','жҳҢ','е»ү'], 'дёҒ':['жңҲ','еҗҢ','ж©ҹ','е·Ё'], 'жҲҠ':['иІӘ','жңҲ','ејј','ж©ҹ'], 'е·ұ':['жӯҰ','иІӘ','жўҒ','жӣІ'], 'еәҡ':['йҷҪ','жӯҰ','еәң','еҗҢ'], 'иҫӣ':['е·Ё','йҷҪ','жӣІ','жҳҢ'], 'еЈ¬':['жўҒ','зҙ«','е·Ұ','жӯҰ'], 'зҷё':['з ҙ','е·Ё','йҷ°','иІӘ'] };
        const STAR_MAP = {'зҙ«':'зҙ«еҫ®','ж©ҹ':'еӨ©ж©ҹ','йҷҪ':'еӨӘйҷҪ','жӯҰ':'жӯҰжӣІ','еҗҢ':'еӨ©еҗҢ','е»ү':'е»үиІһ','еәң':'еӨ©еәң','жңҲ':'еӨӘйҷ°','иІӘ':'иІӘзӢј','е·Ё':'е·Ёй–Җ','зӣё':'еӨ©зӣё','жўҒ':'еӨ©жўҒ','ж®ә':'дёғж®ә','з ҙ':'з ҙи»Қ','жҳҢ':'ж–ҮжҳҢ','жӣІ':'ж–ҮжӣІ','е·Ұ':'е·Ұиј”','ејј':'еҸіејј'};
        const WUXING_MAP = { 2: "ж°ҙдәҢеұҖ", 3: "жңЁдёүеұҖ", 4: "йҮ‘еӣӣеұҖ", 5: "еңҹдә”еұҖ", 6: "зҒ«е…ӯеұҖ" };

        window.onload = updateFriendListDisplay;
        function forceReload() { localStorage.clear(); window.location.reload(true); }
        function saveToFriendList() {
            const name = document.getElementById('userName').value;
            if(!name) return;
            const data = { name, gender: document.getElementById('gender').value, date: document.getElementById('birthDate').value, hour: document.getElementById('birthHour').value };
            let list = JSON.parse(localStorage.getItem('ziwei_friends') || '[]');
            list = list.filter(i => i.name !== name);
            list.push(data);
            localStorage.setItem('ziwei_friends', JSON.stringify(list));
            updateFriendListDisplay();
        }

        function updateFriendListDisplay() {
            const list = JSON.parse(localStorage.getItem('ziwei_friends') || '[]');
            const section = document.getElementById('friendListSection');
            if(list.length === 0) return section.classList.add('hidden');
            section.classList.remove('hidden');
            document.getElementById('friendList').innerHTML = list.map(f => `<button onclick='loadFriend(${JSON.stringify(f)})' class="px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full border border-slate-200">${f.name}</button>`).join('');
        }

        function loadFriend(f) {
            document.getElementById('userName').value = f.name;
            document.getElementById('gender').value = f.gender;
            document.getElementById('birthDate').value = f.date;
            document.getElementById('birthHour').value = f.hour;
            render();
        }

        document.getElementById('ziweiForm').addEventListener('submit', (e) => { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            let [y, m, d] = dateStr.split('-').map(Number);
            if (hVal === "late-zi") {
                let nextDay = Solar.fromYmd(y, m, d).next(1);
                y = nextDay.getYear(); m = nextDay.getMonth(); d = nextDay.getDay();
            }
            let lunar = Solar.fromYmd(y, m, d).getLunar();
            let lMonth = lunar.getMonth(), lDay = lunar.getDay(), yTG = lunar.getYearGan();
            let yTGIdx = (lunar.getYear() - 4) % 10;
            let hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);

            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;
            const jTable = [[4,4,3,3,5,5,4,4,3,3,5,5],[2,2,6,6,3,3,2,2,6,6,3,3],[5,5,4,4,2,2,5,5,4,4,2,2],[3,3,5,5,4,4,3,3,5,5,4,4],[6,6,2,2,5,5,6,6,2,2,5,5]];
            let juice = jTable[yTGIdx % 5][mPos];
            let zPos = calcZiwei(juice, lDay);
            let fPos = (4 - zPos + 12) % 12;

            let stars = Array.from({length:12}, () => []);
            // зҙ«еҫ®жҳҹзі» (йҖҶиЎҢ)
            ["зҙ«еҫ®","еӨ©ж©ҹ","","еӨӘйҷҪ","жӯҰжӣІ","еӨ©еҗҢ","","","е»үиІһ"].forEach((s,i)=>{ if(s) stars[(zPos-i+12)%12].push({n:s, t:'main'}); });
            // еӨ©еәңжҳҹзі» (йҖҶиЎҢжҺ’еҲ—пјҡеәңгҖҒйҷ°гҖҒиІӘгҖҒе·ЁгҖҒзӣёгҖҒжўҒгҖҒж®ә)
            ["еӨ©еәң","еӨӘйҷ°","иІӘзӢј","е·Ёй–Җ","еӨ©зӣё","еӨ©жўҒ","дёғж®ә"].forEach((s,i)=>{ stars[(fPos-i+12)%12].push({n:s, t:'main'}); });
            // з ҙи»Қе–®зҚЁе®ҡдҪҚ (еӨ©еәңй ҶиЎҢз¬¬10дҪҚпјҢеҚі fPos+10)
            stars[(fPos+10)%12].push({n:"з ҙи»Қ", t:'main'});

            // еҗүз…һ
            stars[(10+hIdx)%12].push({n:"ж–ҮжӣІ", t:'lucky'}); stars[(10-hIdx+12)%12].push({n:"ж–ҮжҳҢ", t:'lucky'});
            stars[(2+(lMonth-1))%12].push({n:"е·Ұиј”", t:'lucky'}); stars[(10-(lMonth-1)+12)%12].push({n:"еҸіејј", t:'lucky'});
            const ky = {'з”І':[7,9],'д№ҷ':[8,10],'дёҷ':[11,1],'дёҒ':[11,1],'жҲҠ':[7,9],'е·ұ':[8,10],'еәҡ':[7,9],'иҫӣ':[6,2],'еЈ¬':[3,5],'зҷё':[3,5]};
            ky[yTG].forEach((p,i)=>stars[p].push({n:i===0?"еӨ©йӯҒ":"еӨ©йүһ", t:'lucky'}));
            const yt = {'з”І':4,'д№ҷ':5,'дёҷ':7,'дёҒ':8,'жҲҠ':7,'е·ұ':8,'еәҡ':10,'иҫӣ':11,'еЈ¬':1,'зҷё':2};
            stars[yt[yTG]].push({n:"ж“ҺзҫҠ", t:'bad'}); stars[(yt[yTG]-2+12)%12].push({n:"йҷҖзҫ…", t:'bad'});
            stars[(hIdx+10)%12].push({n:"ең°еҠ«", t:'bad'}); stars[(10-hIdx+12)%12].push({n:"ең°з©ә", t:'bad'});
            SIHUA_TABLE[yTG].forEach((short, i) => {
                let full = STAR_MAP[short];
                stars.forEach(p => p.forEach(s => { if(s.n === full) s.sh = ["зҘҝ","ж¬Ҡ","з§‘","еҝҢ"][i]; }));
            });

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let sHtml = stars[dzIdx].map(s => `<div class="${s.t==='main'?'main-star':'small-star'} ${s.t==='lucky'?'lucky':(s.t==='bad'?'bad':'')}">${s.n}${s.sh ? `<br><span class="si-hua">${s.sh}</span>` : ''}</div>`).join('');
                cell.innerHTML = `<div class="flex flex-row-reverse h-24 overflow-hidden">${sHtml}</div><span class="dz-text">${DZ[dzIdx]}</span><span class="palace-tag ${pIdx===0?'bg-red-600 font-bold':'bg-indigo-500'}">${PALACES[pIdx]}</span>`;
                area.insertBefore(cell, area.children[gIdx]);
            });
            document.getElementById('centerInfo').innerHTML = `<p class="font-bold text-lg ziwei-font">${name}</p><p class="text-[10px] text-gray-500">${lunar.getYearInGanZhi()}е№ҙ ${lunar.getMonthInChinese()}жңҲ${lunar.getDayInChinese()}ж—Ҙ</p><div class="inline-block px-3 py-1 bg-red-50 text-red-600 text-xs font-bold rounded-full mt-2 border border-red-100">${WUXING_MAP[juice]}</div>`;
            document.getElementById('chartView').classList.remove('hidden');
        }
        function calcZiwei(j, d) { let q = Math.ceil(d/j), r = d%j, s = (q+1)%12; return (r===0) ? (s+1)%12 : (r%2===0) ? (s+r)%12 : (s-r+12)%12; }
        function exportImage() { html2canvas(document.getElementById('captureArea')).then(canvas => { const link = document.createElement('a'); link.download = `${document.getElementById('userName').value}_е‘ҪзӣӨ.png`; link.href = canvas.toDataURL(); link.click(); }); }
    </script>
</body>
</html>
