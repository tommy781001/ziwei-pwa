<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數排盤</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        /* 12宮位排列順序：由左下順時針繞一圈 */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            background-color: #333;
            border: 2px solid #333;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        .cell {
            background-color: white;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
        }
        .center-box {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background-color: #faf5ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
        }
        .main-star { color: #b91c1c; font-weight: bold; writing-mode: vertical-rl; }
        .palace-name { background: #6d28d9; color: white; padding: 2px 4px; border-radius: 2px; font-size: 0.7rem; align-self: flex-end; }
        .dz-label { font-size: 0.6rem; color: #666; position: absolute; bottom: 2px; left: 4px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-lg p-5 mb-6 border-t-4 border-purple-600">
        <h1 class="text-xl font-bold text-purple-900 mb-4 ziwei-font text-center">紫微斗數 PWA 排盤</h1>
        <form id="ziweiForm" class="grid grid-cols-2 gap-3 text-sm">
            <input type="text" id="userName" placeholder="姓名" required class="border p-2 rounded">
            <select id="gender" class="border p-2 rounded">
                <option value="1">乾造 (男)</option>
                <option value="0">坤造 (女)</option>
            </select>
            <select id="calendarType" class="border p-2 rounded">
                <option value="solar">國曆</option>
                <option value="lunar">農曆</option>
            </select>
            <input type="date" id="birthDate" required class="border p-2 rounded">
            <div class="col-span-2">
            <select id="birthHour" class="w-full border p-2 rounded">
                <option value="0">晚子 (23:00-00:00) - 需跳隔日排盤</option>
                <option value="12">早子 (00:00-01:00)</option>
                <option value="1">丑 (01:00-03:00)</option>
                <option value="2">寅 (03:00-05:00)</option>
                <option value="3">卯 (05:00-07:00)</option>
                <option value="4">辰 (07:00-09:00)</option>
                <option value="5">巳 (09:00-11:00)</option>
                <option value="6">午 (11:00-13:00)</option>
                <option value="7">未 (13:00-15:00)</option>
                <option value="8">申 (15:00-17:00)</option> 
                <option value="9">酉 (17:00-19:00)</option>
                <option value="10">戌 (19:00-21:00)</option>
                <option value="11">亥 (21:00-23:00)</option>
            </select>
            </div>
            <button type="submit" class="col-span-2 bg-purple-700 text-white font-bold py-2 rounded-lg mt-2">執行排盤</button>
        </form>
    </div>

    <div id="chartView" class="hidden">
        <div class="chart-grid" id="mainChart">
            <div class="center-box shadow-inner">
                <div id="centerInfo" class="text-xs space-y-1"></div>
            </div>
        </div>
    </div>

<script>
    // 常數定義
    const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
    const WUXING_MAP = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

    // 紫微系與天府系排列順序 (逆時針與順時針)
    const ZIWEI_GROUP = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
    const TIANFU_GROUP = ["天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "", "", "", "", "破軍"];

    document.getElementById('ziweiForm').addEventListener('submit', function(e) {
        e.preventDefault();
        renderChart();
    });

function renderChart() {
    const name = document.getElementById('userName').value;
    const dateInput = document.getElementById('birthDate').value;
    const hourValue = parseInt(document.getElementById('birthHour').value); // 這裡改用 hourValue
    const isSolar = document.getElementById('calendarType').value === 'solar';
    
    if(!dateInput) return;

    // --- 核心邏輯：處理子時跨日 ---
    let d = new Date(dateInput);
    let hourIdx; // 最終用於排盤的地支索引 (0-11)

    if (hourValue === 0) {
        // 選項是「晚子 (23:00-00:00)」
        // 邏輯：日期加一天，地支依然是子(0)
        d.setDate(d.getDate() + 1);
        hourIdx = 0; 
    } else if (hourValue === 12) {
        // 選項是「早子 (00:00-01:00)」
        // 邏輯：日期不變，地支是子(0)
        hourIdx = 0;
    } else {
        // 其他時辰 (丑到亥)
        hourIdx = hourValue;
    }

    // --- 使用調整後的日期 d 進行農曆轉換 ---
    let lunar = isSolar ? 
        Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()) : 
        Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());

    const lYear = lunar.getYear();
    const lMonth = lunar.getMonth();
    const lDay = lunar.getDay();
    const yearTGIdx = (lYear - 4) % 10; 

    // 1. 定命宮 (使用修正後的時辰 hourIdx)
    const mingIdx = (lMonth - hourIdx + 12) % 12 + 2;
    const finalMingIdx = mingIdx % 12; 

    // 2. 定五行局 (己年 + 戌宮 = 火六局)
    const juice = getWuXingJu(yearTGIdx, finalMingIdx); 

    // 3. 定紫微星位置
    const ziweiIdx = getZiweiIdx(juice, lDay);

    // 4. 定天府星位置 (對稱於 寅申線)
    const tianfuIdx = (4 - ziweiIdx + 12) % 12;

    // --- 以下為繪製圖表的邏輯 (保持不變) ---
    const chartArea = document.getElementById('mainChart');
    Array.from(chartArea.querySelectorAll('.cell')).forEach(el => el.remove());

    const gridOrder = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
    
    gridOrder.forEach((dzIdx, gridIdx) => {
        if(dzIdx === -1) return;

        const cell = document.createElement('div');
        cell.className = 'cell border';
        
        const palaceIdx = (dzIdx - finalMingIdx + 12) % 12;
        const pName = PALACES[palaceIdx];
        
        let stars = [];
        ZIWEI_GROUP.forEach((s, i) => {
            if (s && (ziweiIdx - i + 12) % 12 === dzIdx) stars.push(s);
        });
        TIANFU_GROUP.forEach((s, i) => {
            if (s && (tianfuIdx + i) % 12 === dzIdx) stars.push(s);
        });

        cell.innerHTML = `
            <div class="flex flex-row-reverse h-full space-x-reverse space-x-1">
                ${stars.map(s => `<div class="main-star text-[11px] leading-tight">${s}</div>`).join('')}
            </div>
            <span class="dz-label">${DZ[dzIdx]}</span>
            <span class="palace-name ${pName==='命宮'?'bg-red-600':''}">${pName}</span>
        `;
        
        chartArea.insertBefore(cell, chartArea.children[gridIdx]);
    });

    document.getElementById('centerInfo').innerHTML = `
        <p class="font-bold text-lg text-purple-800">${name}</p>
        <p class="text-xs">${TG[yearTGIdx]}${DZ[(lYear-4)%12]}年 ${lMonth}月${lDay}日</p>
        <p class="text-xs font-semibold text-blue-600">${WUXING_MAP[juice]}</p>
    `;
    document.getElementById('chartView').classList.remove('hidden');
    
    // 儲存資料到 LocalStorage
    localStorage.setItem('ziwei_pwa_data', JSON.stringify({name, dateInput, hourValue}));
}
    // 五行局推算邏輯
    function getWuXingJu(tg, dz) {
        const table = [
            [4, 4, 3, 3, 5, 5], // 甲己年
            [2, 2, 6, 6, 3, 3], // 乙庚年
            [5, 5, 4, 4, 2, 2], // 丙辛年
            [3, 3, 5, 5, 4, 4], // 丁壬年
            [6, 6, 2, 2, 5, 5]  // 戊癸年
        ];
        return table[tg % 5][Math.floor(dz / 2)];
    }

    // 紫微星定位邏輯 (生日 / 局數)
    function getZiweiIdx(juice, day) {
        let quotient = Math.ceil(day / juice);
        let remainder = day % juice;
        let start = (quotient + 1) % 12; // 基礎起始位
        
        if (remainder === 0) return (start + 1) % 12;
        if (remainder % 2 === 0) return (start + remainder) % 12; // 偶數順行
        return (start - remainder + 12) % 12; // 奇數逆行
    }
</script>
</body>
</html>
