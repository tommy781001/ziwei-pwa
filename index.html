<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數排盤</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        /* 12宮位排列順序：由左下順時針繞一圈 */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            background-color: #333;
            border: 2px solid #333;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        .cell {
            background-color: white;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
        }
        .center-box {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background-color: #faf5ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
        }
        .main-star { color: #b91c1c; font-weight: bold; writing-mode: vertical-rl; }
        .palace-name { background: #6d28d9; color: white; padding: 2px 4px; border-radius: 2px; font-size: 0.7rem; align-self: flex-end; }
        .dz-label { font-size: 0.6rem; color: #666; position: absolute; bottom: 2px; left: 4px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-lg p-5 mb-6 border-t-4 border-purple-600">
        <h1 class="text-xl font-bold text-purple-900 mb-4 ziwei-font text-center">紫微斗數 PWA 排盤</h1>
        <form id="ziweiForm" class="grid grid-cols-2 gap-3 text-sm">
            <input type="text" id="userName" placeholder="姓名" required class="border p-2 rounded">
            <select id="gender" class="border p-2 rounded">
                <option value="1">乾造 (男)</option>
                <option value="0">坤造 (女)</option>
            </select>
            <select id="calendarType" class="border p-2 rounded">
                <option value="solar">國曆</option>
                <option value="lunar">農曆</option>
            </select>
            <input type="date" id="birthDate" required class="border p-2 rounded">
            <div class="col-span-2">
                <select id="birthHour" class="w-full border p-2 rounded">
                    <option value="0">子 23:00-01:00</option>
                    <option value="1">丑 01:00-03:00</option>
                    <option value="2">寅 03:00-05:00</option>
                    <option value="3">卯 05:00-07:00</option>
                    <option value="4">辰 07:00-09:00</option>
                    <option value="5">巳 09:00-11:00</option>
                    <option value="6">午 11:00-13:00</option>
                    <option value="7">未 13:00-15:00</option>
                    <option value="8">申 15:00-17:00</option>
                    <option value="9">酉 17:00-19:00</option>
                    <option value="10">戌 19:00-21:00</option>
                    <option value="11">亥 21:00-23:00</option>
                </select>
            </div>
            <button type="submit" class="col-span-2 bg-purple-700 text-white font-bold py-2 rounded-lg mt-2">執行排盤</button>
        </form>
    </div>

    <div id="chartView" class="hidden">
        <div class="chart-grid" id="mainChart">
            <div class="center-box shadow-inner">
                <div id="centerInfo" class="text-xs space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        
        // 映射網頁 Grid 座標到地支索引
        // Grid 順序：左上到右下
        const gridOrder = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];

        document.getElementById('ziweiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            renderChart();
        });

        function renderChart() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value;
            const hourIdx = parseInt(document.getElementById('birthHour').value);
            const isSolar = document.getElementById('calendarType').value === 'solar';
            
            if(!dateStr) return;
            const d = new Date(dateStr);
            let lunar;
            if(isSolar) {
                lunar = Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
            } else {
                lunar = Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()); // 簡化邏輯，假設輸入即農曆
            }

            // 1. 計算命宮位置 (寅宮起正月，順數生月，逆數生時)
            // 簡化公式：(月Idx - 時Idx + 12) % 12 + 2 (寅是2)
            const month = lunar.getMonth();
            const mingIdx = (month - hourIdx + 12) % 12 + 2;
            const finalMingIdx = mingIdx % 12;

            // 2. 清理並重新繪製
            const chartArea = document.getElementById('mainChart');
            // 保留中央區，清除其他 cell
            Array.from(chartArea.querySelectorAll('.cell')).forEach(el => el.remove());

            gridOrder.forEach((dzIdx, gridIdx) => {
                if(dzIdx === -1) return; // 中央區域跳過

                const cell = document.createElement('div');
                cell.className = 'cell border';
                
                // 計算該宮位名稱
                const palaceIdx = (dzIdx - finalMingIdx + 12) % 12;
                const pName = PALACES[palaceIdx];

                cell.innerHTML = `
                    <div class="flex flex-row-reverse h-full">
                        <div class="main-star text-sm">${getStars(dzIdx, month, hourIdx)}</div>
                    </div>
                    <span class="dz-label">${DZ[dzIdx]}</span>
                    <span class="palace-name">${pName}</span>
                `;
                
                // 根據 Grid 順序插入
                chartArea.insertBefore(cell, chartArea.children[gridIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `
                <p class="font-bold text-lg text-purple-800">${name}</p>
                <p>${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月 ${lunar.getDayInChinese()}日</p>
                <p>${DZ[hourIdx]}時生</p>
            `;
            document.getElementById('chartView').classList.remove('hidden');
            
            // 儲存
            localStorage.setItem('ziwei_pwa_data', JSON.stringify({name, dateStr, hourIdx}));
        }

        function getStars(dzIdx, month, hour) {
            // 這裡可以擴展十四主星邏輯
            // 目前先做演示，實際需要導入更複雜的五行局與紫微星定位公式
            return ""; 
        }

        // 載入緩存
        window.onload = () => {
            const data = JSON.parse(localStorage.getItem('ziwei_pwa_data'));
            if(data) {
                document.getElementById('userName').value = data.name;
                document.getElementById('birthDate').value = data.dateStr;
                document.getElementById('birthHour').value = data.hourIdx;
            }
        };
    </script>
</body>
</html>
