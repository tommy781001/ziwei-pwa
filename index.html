<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數 PWA v1.5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-container { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background-color: #334155; 
            border: 4px solid #1e293b; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(4, 1fr); 
            gap: 2px;
        }
        .cell { background: white; position: relative; padding: 6px; display: flex; flex-direction: column; justify-content: space-between; }
        .star-container { display: flex; flex-direction: row-reverse; height: 100%; overflow: hidden; gap: 2px; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 1.1rem; line-height: 1.1; letter-spacing: 0.1rem; font-family: 'Noto Serif TC', serif; }
        .center-box { 
            grid-column: 2 / 4; 
            grid-row: 2 / 4; 
            background: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            text-align: center; 
            padding: 8px;
            border: 1px inset #cbd5e1;
        }
        .palace-tag { font-size: 0.7rem; color: white; padding: 2px 5px; border-radius: 4px; background: #6366f1; font-weight: bold; align-self: flex-end; }
        .palace-tag.is-ming { background: #be123c; }
        .dz-text { font-size: 0.7rem; color: #94a3b8; position: absolute; bottom: 4px; left: 6px; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-3xl p-6 mb-8 border-t-8 border-indigo-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 ziwei-font">紫微斗數 PWA</h1>
            <span class="text-xs font-mono text-indigo-400 bg-indigo-50 px-2 py-1 rounded">v1.5.0</span>
        </div>
        
        <form id="ziweiForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-xs font-bold text-slate-400 mb-1">姓名</label><input type="text" id="userName" value="楊博元" required class="w-full border-b-2 p-2 outline-none focus:border-indigo-500 bg-slate-50"></div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">性別</label><select id="gender" class="w-full border-b-2 p-2 outline-none bg-slate-50"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select></div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">曆法選擇</label><select id="calendarType" class="w-full border-b-2 p-2 outline-none bg-slate-50"><option value="solar">國曆 (公曆)</option><option value="lunar">農曆 (陰曆)</option></select></div>
            <div><label class="block text-xs font-bold text-slate-400 mb-1">出生日期</label><input type="date" id="birthDate" value="1989-10-01" required class="w-full border-b-2 p-2 outline-none bg-slate-50"></div>
            <div class="md:col-span-2"><label class="block text-xs font-bold text-slate-400 mb-1">出生時辰</label>
                <select id="birthHour" class="w-full border-b-2 p-2 outline-none bg-slate-50">
                    <option value="0">早子 (00:00-01:00)</option><option value="1">丑</option><option value="2">寅</option><option value="3">卯</option><option value="4">辰</option><option value="5">巳</option><option value="6">午</option><option value="7">未</option><option value="8">申</option><option value="9">酉</option><option value="10">戌</option><option value="11">亥</option><option value="late-zi">晚子 (23:00-00:00)</option>
                </select>
            </div>
            <div class="md:col-span-2 flex flex-col gap-3 mt-4">
                <button type="submit" class="w-full bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-800 transition-all text-lg">執行排盤</button>
                <button type="button" onclick="location.reload()" class="w-full bg-slate-200 text-slate-600 py-2 rounded-xl text-sm font-medium hover:bg-slate-300">強制更新</button>
            </div>
        </form>
    </div>

    <div id="chartView" class="hidden max-w-2xl mx-auto">
        <div class="bg-slate-900 p-2 md:p-4 rounded-xl shadow-2xl overflow-hidden">
            <div class="chart-container" id="mainChart"><div class="center-box" id="centerInfo"></div></div>
        </div>
    </div>

    <script>
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const genderStr = document.getElementById('gender').value === "1" ? "乾造 (男)" : "坤造 (女)";
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            const hourName = document.getElementById('birthHour').options[document.getElementById('birthHour').selectedIndex].text.split(' ')[0];
            const isLunarInput = document.getElementById('calendarType').value === 'lunar';
            
            let [y, m, d] = dateStr.split('-').map(Number);
            let solar, lunar;

            if (isLunarInput) {
                lunar = Lunar.fromYmd(y, m, d);
                if (hVal === "late-zi") lunar = lunar.next(1);
                solar = lunar.getSolar();
            } else {
                solar = Solar.fromYmd(y, m, d);
                if (hVal === "late-zi") solar = solar.next(1);
                lunar = solar.getLunar();
            }

            const yTGIdx = TG.indexOf(lunar.getYearGan());
            const hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);
            const lMonth = lunar.getMonth();
            const lDay = lunar.getDay();

            // 1. 命宮定位
            const mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;

            // 2. 五行局 (v1.3.2 鎖定邏輯)
            const startTGIdx = (yTGIdx % 5) * 2 + 2; 
            const mTGIdx = (startTGIdx + (mPos - 2 + 12) % 12) % 10;
            function calculateWuxing(tgIdx, dzIdx) {
                const tgN = Math.floor(tgIdx / 2) + 1;
                const dzN = (Math.floor(dzIdx / 2) % 3) + 1;
                let n = tgN + dzN; if (n > 5) n -= 5;
                return { 1: 3, 2: 4, 3: 2, 4: 6, 5: 5 }[n];
            }
            const juice = calculateWuxing(mTGIdx, mPos);

            // 3. 安紫微星系
            function getZiweiPos(j, d) {
                let q = Math.ceil(d / j), r = d % j;
                let s = (q + 1) % 12;
                if (r === 0) return (s + 1) % 12;
                return (r % 2 === 0) ? (s + r) % 12 : (s - r + 12) % 12;
            }
            const zwPos = getZiweiPos(juice, lDay);
            const zwStars = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
            let starMap = Array.from({length: 12}, () => []);
            zwStars.forEach((s, i) => {
                if (s) starMap[(zwPos - i + 12) % 12].push(s);
            });

            // 4. 渲染
            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const gridOrder = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            
            gridOrder.forEach((dzIdx) => {
                if (dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                const pIdx = (mPos - dzIdx + 12) % 12;
                const isMing = (pIdx === 0);
                
                let sHtml = starMap[dzIdx].map(s => `<div class="main-star">${s}</div>`).join('');
                
                cell.innerHTML = `
                    <div class="star-container">${sHtml}</div>
                    <span class="dz-text">${DZ[dzIdx]}</span>
                    <span class="palace-tag ${isMing ? 'is-ming' : ''}">${PALACES[pIdx]}</span>
                `;
                area.appendChild(cell);
            });

            document.getElementById('centerInfo').innerHTML = `
                <div class="mt-1"><p class="text-lg font-black text-slate-800">${name}</p><p class="text-[10px] text-indigo-600 font-bold mb-2">${genderStr} / ${hourName}</p></div>
                <div class="space-y-1 w-full">
                    <div class="bg-white px-2 py-1 rounded border border-slate-100 text-left"><p class="text-[7px] text-slate-400 font-bold">SOLAR 國曆</p><p class="text-[11px] text-slate-700 font-mono font-bold">${solar.toYmd()}</p></div>
                    <div class="bg-white px-2 py-1 rounded border border-slate-100 text-left"><p class="text-[7px] text-slate-400 font-bold">LUNAR 農曆</p><p class="text-[11px] text-slate-700 font-bold">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p></div>
                </div>
                <div class="mt-3 inline-block px-5 py-1 bg-red-50 text-red-600 text-xs font-black rounded-full border border-red-200">${WUXING[juice]}</div>
            `;
            document.getElementById('chartView').classList.remove('hidden');
        });
    </script>
</body>
</html>
