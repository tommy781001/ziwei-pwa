<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微 PWA v1.1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #334155; width: 100%; max-width: 600px; aspect-ratio: 1/1; margin: 0 auto; border: 2px solid #0f172a; }
        .cell { background: white; position: relative; padding: 2px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; border: 1px inset #e2e8f0; }
        .main-star { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.9rem; line-height: 1.1; margin-left: 1px; }
        .small-star { writing-mode: vertical-rl; font-size: 0.7rem; line-height: 1; margin-left: 1px; }
        .lucky { color: #15803d; } .bad { color: #64748b; }
        .si-hua { color: #ea580c; font-size: 0.6rem; border: 1px solid #ea580c; border-radius: 2px; padding: 0 1px; margin-top: 2px; background: #fff7ed; }
        .palace-tag { font-size: 0.7rem; color: white; padding: 2px 5px; border-radius: 3px; align-self: flex-end; }
        .dz-text { font-size: 0.65rem; color: #94a3b8; position: absolute; bottom: 2px; left: 4px; font-weight: bold; }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div class="max-w-md mx-auto bg-white shadow-xl rounded-2xl p-6 mb-4 border-t-4 border-indigo-600">
        <h1 class="text-xl font-bold text-center text-slate-800 ziwei-font mb-4">紫微斗數 PWA <span class="text-xs text-indigo-400 font-mono">v1.1.3</span></h1>
        
        <form id="ziweiForm" class="space-y-3">
            <input type="text" id="userName" placeholder="姓名" required class="w-full border-b p-2 outline-none focus:border-indigo-500">
            <div class="grid grid-cols-2 gap-2">
                <select id="gender" class="border-b p-2 outline-none"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
                <input type="date" id="birthDate" required class="border-b p-2 outline-none">
            </div>
            <select id="birthHour" class="w-full border-b p-2 outline-none">
                <option value="late-zi">晚子 (23:00-00:00) 算隔日</option>
                <option value="0">早子 (00:00-01:00)</option><option value="1">丑</option><option value="2">寅</option>
                <option value="3">卯</option><option value="4">辰</option><option value="5">巳</option>
                <option value="6">午</option><option value="7">未</option><option value="8">申</option>
                <option value="9">酉</option><option value="10">戌</option><option value="11">亥</option>
            </select>
            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md active:bg-indigo-700">立即排盤</button>
        </form>
    </div>

    <div id="chartView" class="hidden text-center pb-8">
        <div id="captureArea" class="inline-block p-2 bg-slate-900 rounded-lg">
            <div class="chart-grid" id="mainChart">
                <div class="center-box" id="centerInfo"></div>
            </div>
        </div>
        <div class="mt-4"><button onclick="exportImage()" class="bg-slate-700 text-white px-8 py-2 rounded-full font-bold">保存圖片</button></div>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const SIHUA = { '甲':['廉','破','武','陽'], '乙':['機','梁','紫','陰'], '丙':['同','機','昌','廉'], '丁':['月','同','機','巨'], '戊':['貪','月','弼','機'], '己':['武','貪','梁','曲'], '庚':['陽','武','府','同'], '辛':['巨','陽','曲','昌'], '壬':['梁','紫','左','武'], '癸':['破','巨','陰','貪'] };
        const S_MAP = {'紫':'紫微','機':'天機','陽':'太陽','武':'武曲','同':'天同','廉':'廉貞','府':'天府','月':'太陰','貪':'貪狼','巨':'巨門','相':'天相','梁':'天梁','殺':'七殺','破':'破軍','昌':'文昌','曲':'文曲','左':'左輔','弼':'右弼'};
        const WUXING = { 2:"水二局", 3:"木三局", 4:"金四局", 5:"土五局", 6:"火六局" };

        document.getElementById('ziweiForm').addEventListener('submit', (e) => { e.preventDefault(); render(); });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value;
            const hVal = document.getElementById('birthHour').value;
            let [y, m, d] = dateStr.split('-').map(Number);
            
            // 晚子時處理：直接物理進位日期
            if(hVal === "late-zi") {
                let next = Solar.fromYmd(y, m, d).next(1);
                y = next.getYear(); m = next.getMonth(); d = next.getDay();
            }
            
            let lunar = Solar.fromYmd(y, m, d).getLunar();
            let lM = lunar.getMonth(), lD = lunar.getDay(), yTG = lunar.getYearGan();
            let yTGIdx = (lunar.getYear() - 4) % 10;
            let hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);

            // 1.0.7 核心命盤定位邏輯
            let mPos = (2 + (lM - 1) - hIdx + 12) % 12;
            const jTable = [[4,4,3,3,5,5,4,4,3,3,5,5],[2,2,6,6,3,3,2,2,6,6,3,3],[5,5,4,4,2,2,5,5,4,4,2,2],[3,3,5,5,4,4,3,3,5,5,4,4],[6,6,2,2,5,5,6,6,2,2,5,5]];
            let juice = jTable[yTGIdx % 5][mPos];
            let zPos = calcZiwei(juice, lD), fPos = (4 - zPos + 12) % 12;

            let stars = Array.from({length:12}, () => []);
            // 主星系
            ["紫微","天機","","太陽","武曲","天同","","","廉貞"].forEach((s,i)=>{ if(s) stars[(zPos-i+12)%12].push({n:s, t:'main'}); });
            ["天府","太陰","貪狼","巨門","天相","天梁","七殺"].forEach((s,i)=>{ stars[(fPos-i+12)%12].push({n:s, t:'main'}); });
            stars[(fPos+9)%12].push({n:"破軍", t:'main'}); // 修正破軍位置

            // 六吉六煞
            stars[(10+hIdx)%12].push({n:"文曲", t:'lucky'}); stars[(10-hIdx+12)%12].push({n:"文昌", t:'lucky'});
            stars[(2+(lM-1))%12].push({n:"左輔", t:'lucky'}); stars[(10-(lM-1)+12)%12].push({n:"右弼", t:'lucky'});
            const ky = {'甲':[7,9],'乙':[8,10],'丙':[11,1],'丁':[11,1],'戊':[7,9],'己':[8,10],'庚':[7,9],'辛':[6,2],'壬':[3,5],'癸':[3,5]};
            ky[yTG].forEach((p,i)=>stars[p].push({n:i===0?"天魁":"天鉞", t:'lucky'}));
            const yt = {'甲':4,'乙':5,'丙':7,'丁':8,'戊':7,'己':8,'庚':10,'辛':11,'壬':1,'癸':2};
            stars[yt[yTG]].push({n:"擎羊", t:'bad'}); stars[(yt[yTG]-2+12)%12].push({n:"陀羅", t:'bad'});
            stars[(hIdx+10)%12].push({n:"地劫", t:'bad'}); stars[(10-hIdx+12)%12].push({n:"地空", t:'bad'});
            
            // 四化
            SIHUA[yTG].forEach((s, i) => {
                let full = S_MAP[s];
                stars.forEach(p => p.forEach(st => { if(st.n === full) st.sh = ["祿","權","科","忌"][i]; }));
            });

            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());
            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];

            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let sHtml = stars[dzIdx].map(s => `<div class="${s.t==='main'?'main-star':'small-star'} ${s.t==='lucky'?'lucky':(s.t==='bad'?'bad':'')}">${s.n}${s.sh ? `<br><span class="si-hua">${s.sh}</span>` : ''}</div>`).join('');
                cell.innerHTML = `<div class="flex flex-row-reverse h-24 overflow-hidden">${sHtml}</div><span class="dz-text">${DZ[dzIdx]}</span><span class="palace-tag ${pIdx===0?'bg-rose-600 font-bold':'bg-indigo-500'}">${PALACES[pIdx]}</span>`;
                area.insertBefore(cell, area.children[gIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `<p class="font-bold text-lg ziwei-font">${name}</p><p class="text-xs text-slate-500 mt-1">${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日</p><div class="px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-full mt-3 border border-indigo-100">${WUXING[juice]}</div>`;
            document.getElementById('chartView').classList.remove('hidden');
        }

        function calcZiwei(j, d) { let q = Math.ceil(d/j), r = d%j, s = (q+1)%12; return (r===0) ? (s+1)%12 : (r%2===0) ? (s+r)%12 : (s-r+12)%12; }
        function exportImage() { html2canvas(document.getElementById('captureArea')).then(canvas => { const link = document.createElement('a'); link.download = `命盤_${document.getElementById('userName').value}.png`; link.href = canvas.toDataURL(); link.click(); }); }
    </script>
</body>
</html>
