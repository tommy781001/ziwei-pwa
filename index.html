<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微排盤 v1.0.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background-color: #333; aspect-ratio: 1/1; }
        .cell { background: white; position: relative; padding: 2px; display: flex; flex-direction: column; justify-content: space-between; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; background: #fdfaff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-star { writing-mode: vertical-rl; color: #e11d48; font-weight: bold; font-size: 0.75rem; }
        .palace-tag { font-size: 0.65rem; color: white; padding: 1px 3px; border-radius: 2px; align-self: flex-end; }
        .dz-text { font-size: 0.6rem; color: #999; position: absolute; bottom: 2px; left: 2px; }
    </style>
</head>
<body class="bg-gray-100 p-2">
    <div class="max-w-md mx-auto bg-white shadow-lg rounded-lg p-4 mb-4">
        <h1 class="text-xl font-bold text-center text-purple-800 ziwei-font">紫微斗數 PWA <span class="text-xs font-mono text-gray-400">v1.0.3</span></h1>
        
        <form id="ziweiForm" class="grid grid-cols-2 gap-2 mt-4 text-sm">
            <input type="text" id="userName" placeholder="姓名" class="border p-2 rounded">
            <select id="gender" class="border p-2 rounded"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
            <select id="calendarType" class="border p-2 rounded"><option value="solar">國曆</option></select>
            <input type="date" id="birthDate" class="border p-2 rounded">
            <select id="birthHour" class="col-span-2 border p-2 rounded">
                <option value="晚子">晚子 (23:00-00:00) 隔日排盤</option>
                <option value="早子">早子 (00:00-01:00)</option>
                <option value="1">丑 (01:00-03:00)</option><option value="2">寅 (03:00-05:00)</option>
                <option value="3">卯 (05:00-07:00)</option><option value="4">辰 (07:00-09:00)</option>
                <option value="5">巳 (09:00-11:00)</option><option value="6">午 (11:00-13:00)</option>
                <option value="7">未 (13:00-15:00)</option><option value="8">申 (15:00-17:00)</option>
                <option value="9">酉 (17:00-19:00)</option><option value="10">戌 (19:00-21:00)</option>
                <option value="11">亥 (21:00-23:00)</option>
            </select>
            <button type="submit" class="col-span-2 bg-purple-600 text-white py-2 rounded font-bold">執行排盤</button>
            <button type="button" onclick="clearAppCache()" class="col-span-2 text-[10px] text-gray-400 underline">強制重新載入版本</button>
        </form>
    </div>

    <div id="chartView" class="hidden max-w-md mx-auto">
        <div class="chart-grid border border-gray-800" id="mainChart">
            <div class="center-box"><div id="centerInfo" class="text-center"></div></div>
        </div>
    </div>

    <script>
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        const WUXING_MAP = { 2: "水二局", 3: "木三局", 4: "金四局", 5: "土五局", 6: "火六局" };
        const ZIWEI_GRP = ["紫微", "天機", "", "太陽", "武曲", "天同", "", "", "廉貞"];
        const TIANFU_GRP = ["天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "", "", "", "", "破軍"];

        function clearAppCache() {
            localStorage.clear();
            location.reload(true);
        }

        document.getElementById('ziweiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            render();
        });

        function render() {
            const name = document.getElementById('userName').value;
            const dateStr = document.getElementById('birthDate').value;
            const hVal = document.getElementById('birthHour').value;
            if(!dateStr) return;

            let d = new Date(dateStr);
            let hIdx = (hVal === '晚子' || hVal === '早子') ? 0 : parseInt(hVal);
            if (hVal === '晚子') d.setDate(d.getDate() + 1);

            let lunar = Lunar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
            let lMonth = lunar.getMonth();
            let lDay = lunar.getDay();
            let yTG = (lunar.getYear() - 4) % 10;

            // 命宮：寅(2)起正月順數月，逆數時
            let mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;

            // 五行局表 (甲己=0, 乙庚=1, 丙辛=2, 丁壬=3, 戊癸=4)
            const jTable = [[4,4,3,3,5,5,4,4,3,3,5,5],[2,2,6,6,3,3,2,2,6,6,3,3],[5,5,4,4,2,2,5,5,4,4,2,2],[3,3,5,5,4,4,3,3,5,5,4,4],[6,6,2,2,5,5,6,6,2,2,5,5]];
            let juice = jTable[yTG % 5][mPos];

            // 紫微星
            let zPos = calcZiwei(juice, lDay);
            let fPos = (4 - zPos + 12) % 12; // 天府

            const grid = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            const area = document.getElementById('mainChart');
            Array.from(area.querySelectorAll('.cell')).forEach(c => c.remove());

            grid.forEach((dzIdx, gIdx) => {
                if(dzIdx === -1) return;
                const cell = document.createElement('div');
                cell.className = 'cell border border-gray-200';
                let pIdx = (mPos - dzIdx + 12) % 12;
                let s = [];
                ZIWEI_GRP.forEach((v, i) => { if(v && (zPos - i + 12) % 12 === dzIdx) s.push(v); });
                TIANFU_GRP.forEach((v, i) => { if(v && (fPos + i) % 12 === dzIdx) s.push(v); });

                cell.innerHTML = `<div class="flex flex-row-reverse h-12">${s.map(x=>`<span class="main-star">${x}</span>`).join('')}</div>
                    <span class="dz-text">${DZ[dzIdx]}</span>
                    <span class="palace-tag ${pIdx===0?'bg-red-600':'bg-purple-500'}">${PALACES[pIdx]}</span>`;
                area.insertBefore(cell, area.children[gIdx]);
            });

            document.getElementById('centerInfo').innerHTML = `<p class="font-bold text-purple-900">${name}</p>
                <p class="text-[10px] text-gray-500">${lunar.toFullString().split(' ')[0]}</p>
                <p class="text-xs font-bold text-red-600 mt-1 border-t border-red-100">${WUXING_MAP[juice]}</p>`;
            document.getElementById('chartView').classList.remove('hidden');
        }

        function calcZiwei(j, d) {
            let q = Math.ceil(d/j), r = d%j;
            let s = (q+1)%12;
            if(r===0) return (s+1)%12;
            return (r%2===0) ? (s+r)%12 : (s-r+12)%12;
        }
    </script>
</body>
</html>
