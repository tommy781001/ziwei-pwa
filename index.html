<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紫微斗數 PWA v1.9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .ziwei-font { font-family: 'Noto Serif TC', serif; }
        
        /* 命盤樣式 */
        .chart-container { 
            width: 100%; aspect-ratio: 1/1; background-color: #1e293b; 
            border: 2px solid #0f172a; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px;
        }
        .cell { background: white; position: relative; padding: 1px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .stars-wrapper { display: flex; flex-direction: row-reverse; height: 90%; overflow: hidden; gap: 1px; }
        .aux-star-container { display: flex; flex-direction: column; flex-shrink: 0; width: 12px; gap: 1px;}
        .aux-star-text { writing-mode: vertical-rl; font-size: 0.55rem; line-height: 1; font-weight: bold; }
        .aux-star-box.ji .aux-star-text { color: #1e40af; }
        .aux-star-box.sha .aux-star-text { color: #ea580c; }
        .aux-star-box.lma .aux-star-text { color: #854d0e; }
        .main-star-container { display: flex; flex-direction: row-reverse; gap: 1px; }
        .main-star-text { writing-mode: vertical-rl; color: #be123c; font-weight: bold; font-size: 0.85rem; line-height: 1; font-family: 'Noto Serif TC', serif; }
        .shihua-tag { font-size: 0.45rem; color: white; padding: 1px; border-radius: 2px; margin-top: 1px; width: 11px; text-align: center; }
        .shihua-lu { background: #be123c; } .shihua-quan { background: #15803d; } .shihua-ke { background: #1d4ed8; } .shihua-ji { background: #111827; }
        
        /* Tab Bar 樣式 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #4f46e5; border-top: 2px solid #4f46e5; }
    </style>
</head>
<body class="pb-24">

    <main class="p-4 max-w-2xl mx-auto">
        
        <section id="page-chart" class="tab-content active">
            <div class="bg-white shadow-md rounded-2xl p-4 mb-4 border-t-4 border-indigo-600">
                <form id="ziweiForm" class="space-y-4">
                    <div class="grid grid-cols-4 gap-2">
                        <div class="col-span-2"><label class="block text-[10px] font-bold text-slate-400">姓名</label><input type="text" id="userName" value="楊博元" class="w-full border-b p-1 text-sm outline-none"></div>
                        <div><label class="block text-[10px] font-bold text-slate-400">性別</label><select id="gender" class="w-full border-b p-1 text-sm"><option value="1">男</option><option value="0">女</option></select></div>
                        <div><label class="block text-[10px] font-bold text-slate-400">曆法</label><select id="calendarType" class="w-full border-b p-1 text-sm"><option value="solar">國</option><option value="lunar">農</option></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="birthDate" value="1989-10-01" class="w-full border-b p-1 text-sm outline-none">
                        <select id="birthHour" class="w-full border-b p-1 text-sm">
                            <option value="0">00-01 (子)</option><option value="1">01-03 (丑)</option><option value="2">03-05 (寅)</option><option value="3">05-07 (卯)</option><option value="4">07-09 (辰)</option><option value="5">09-11 (巳)</option><option value="6">11-13 (午)</option><option value="7">13-15 (未)</option><option value="8">15-17 (申)</option><option value="9">17-19 (酉)</option><option value="10">19-21 (戌)</option><option value="11">21-23 (亥)</option><option value="late-zi">23-00 (子)</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" class="flex-1 bg-indigo-700 text-white font-bold py-3 rounded-xl text-sm active:scale-95 transition-all">執行排盤</button>
                        <button type="button" onclick="quickSave()" class="px-4 bg-emerald-500 text-white rounded-xl active:scale-95">💾</button>
                    </div>
                </form>
            </div>
            <div id="chartContainer" class="hidden">
                <div class="bg-slate-900 p-1 rounded-xl shadow-2xl overflow-hidden">
                    <div class="chart-container" id="mainChart">
                        <div class="center-box grid-column-2 grid-row-2 col-span-2 row-span-2 bg-slate-50 flex flex-col items-center justify-center p-2 text-center" id="centerInfo"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-data" class="tab-content">
            <div class="bg-white shadow-md rounded-2xl p-5 border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-700">客戶紀錄管理</h2>
                    <div class="flex gap-2">
                        <button onclick="exportCSV()" class="text-xs bg-slate-100 px-3 py-1.5 rounded-lg border">匯出</button>
                        <label class="text-xs bg-slate-100 px-3 py-1.5 rounded-lg border cursor-pointer">匯入<input type="file" accept=".csv" onchange="importCSV(this)" class="hidden"></label>
                    </div>
                </div>
                <div id="recordList" class="space-y-2">
                    </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-16 pb-2 shadow-lg">
        <button onclick="switchTab('chart')" class="nav-item active flex flex-col items-center justify-center flex-1 transition-colors" id="nav-chart">
            <span class="text-xl">☯️</span><span class="text-[10px] font-bold">排盤工具</span>
        </button>
        <button onclick="switchTab('data')" class="nav-item flex flex-col items-center justify-center flex-1 transition-colors" id="nav-data">
            <span class="text-xl">👥</span><span class="text-[10px] font-bold">資料管理</span>
        </button>
    </nav>

    <script>
        // --- 分頁切換邏輯 ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
            if(tab === 'data') renderRecords();
        }

        // --- 紀錄管理 (localStorage) ---
        function getRecords() { return JSON.parse(localStorage.getItem('zwRecords') || '[]'); }
        function quickSave() {
            const records = getRecords();
            const hourSelect = document.getElementById('birthHour');
            const newRec = {
                name: document.getElementById('userName').value || '未命名',
                gender: document.getElementById('gender').value,
                cal: document.getElementById('calendarType').value,
                date: document.getElementById('birthDate').value,
                hour: hourSelect.value,
                hName: hourSelect.options[hourSelect.selectedIndex].text
            };
            records.unshift(newRec);
            localStorage.setItem('zwRecords', JSON.stringify(records));
            alert('已存入資料管理');
        }
        function renderRecords() {
            const records = getRecords();
            const list = document.getElementById('recordList');
            if(records.length === 0) { list.innerHTML = '<p class="text-center text-slate-400 py-10 text-sm">暫無客戶紀錄</p>'; return; }
            list.innerHTML = records.map((r, i) => `
                <div class="bg-slate-50 p-3 rounded-xl flex justify-between items-center border border-slate-100">
                    <div class="cursor-pointer" onclick="loadAndSwitch('${i}')">
                        <div class="font-bold text-slate-800">${r.name} <span class="text-[10px] font-normal text-indigo-500">${r.gender=='1'?'(男)':'(女)'}</span></div>
                        <div class="text-[10px] text-slate-400">${r.date} | ${r.hName}</div>
                    </div>
                    <button onclick="deleteRecord(${i})" class="text-slate-300 hover:text-red-500 px-2 text-xl">✕</button>
                </div>
            `).join('');
        }
        function loadAndSwitch(i) {
            const r = getRecords()[i];
            document.getElementById('userName').value = r.name;
            document.getElementById('gender').value = r.gender;
            document.getElementById('calendarType').value = r.cal;
            document.getElementById('birthDate').value = r.date;
            document.getElementById('birthHour').value = r.hour;
            switchTab('chart');
            document.getElementById('ziweiForm').dispatchEvent(new Event('submit'));
        }
        function deleteRecord(i) {
            if(!confirm('確定刪除此紀錄？')) return;
            const records = getRecords(); records.splice(i, 1);
            localStorage.setItem('zwRecords', JSON.stringify(records));
            renderRecords();
        }

        // --- 匯入匯出 ---
        function exportCSV() {
            const records = getRecords();
            let csv = "姓名,性別,曆法,日期,時辰\n";
            records.forEach(r => csv += `${r.name},${r.gender},${r.cal},${r.date},${r.hour}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `客戶資料_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }
        function importCSV(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n').slice(1);
                const records = getRecords();
                lines.forEach(line => {
                    const [n, g, c, d, h] = line.split(',');
                    if(n) records.push({name:n, gender:g, cal:c, date:d, hour:h, hName:'匯入資料'});
                });
                localStorage.setItem('zwRecords', JSON.stringify(records));
                renderRecords();
            };
            reader.readAsText(file);
        }

        // --- 核心排盤邏輯 (同 v1.8.6) ---
        const TG = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const DZ = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const PALACES = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        
        document.getElementById('ziweiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const genderVal = document.getElementById('gender').value;
            const dateStr = document.getElementById('birthDate').value; 
            const hVal = document.getElementById('birthHour').value;
            const isLunarInput = document.getElementById('calendarType').value === 'lunar';
            let [y, m, d] = dateStr.split('-').map(Number);
            let solar, lunar;
            if (isLunarInput) { lunar = Lunar.fromYmd(y, m, d); if (hVal === "late-zi") lunar = lunar.next(1); solar = lunar.getSolar(); }
            else { solar = Solar.fromYmd(y, m, d); if (hVal === "late-zi") solar = solar.next(1); lunar = solar.getLunar(); }
            const lMonth = lunar.getMonth(), lDay = lunar.getDay();
            const ganName = lunar.getYearGan(), zhiName = lunar.getYearZhi();
            const yTGIdx = TG.indexOf(ganName), yDZIdx = DZ.indexOf(zhiName);
            const hIdx = (hVal === "late-zi") ? 0 : parseInt(hVal);
            const personType = (yTGIdx % 2 === 0 ? "陽" : "陰") + (genderVal === "1" ? "男" : "女");
            const mPos = (2 + (lMonth - 1) - hIdx + 12) % 12;
            const mTGIdx = ((yTGIdx % 5) * 2 + 2 + (mPos - 2 + 12) % 12) % 10;
            const juice = (function(tg, dz){
                const tn = Math.floor(tg/2)+1, dn = (Math.floor(dz/2)%3)+1;
                let n = tn+dn; if(n>5) n-=5; return {1:3, 2:4, 3:2, 4:6, 5:5}[n] || 2;
            })(mTGIdx, mPos);
            const zwPos = (function(d, j){ let q = d%j===0 ? d/j : Math.floor(d/j)+1, r = (q*j)-d, p = (q+1)%12; return r===0 ? p : (r%2!==0 ? (p-r+12)%12 : (p+r)%12); })(lDay, juice);
            const tfPos = (4 - zwPos + 12) % 12;
            let mainStarMap = Array.from({length: 12}, () => []), auxStarMap = Array.from({length: 12}, () => []); 
            const shihuaConf = [['廉貞','破軍','武曲','太陽'],['天機','天梁','紫微','太陰'],['天同','天機','文昌','廉貞'],['太陰','天同','天機','巨門'],['貪狼','太陰','右弼','天機'],['武曲','貪狼','天梁','文曲'],['太陽','武曲','太陰','天同'],['巨門','太陽','文曲','文昌'],['天梁','紫微','左輔','武曲'],['破軍','巨門','天機','貪狼']];
            const currentShihua = shihuaConf[yTGIdx];
            const addMain = (pos, s) => { if(s) mainStarMap[(pos+12)%12].push({name:s, sh:currentShihua.indexOf(s)}); };
            ["紫微","天機","","太陽","武曲","天同","","","廉貞"].forEach((s,i)=> addMain(zwPos-i, s));
            ["天府","太陰","貪狼","巨門","天相","天梁","七殺","","","","破軍"].forEach((s,i)=> addMain(tfPos+i, s));
            const addAux = (pos, name, type) => { auxStarMap[(pos+12)%12].push({name, type, sh:currentShihua.indexOf(name)}); };
            addAux(4+lMonth-1, '左輔', 'ji'); addAux(10-lMonth+1, '右弼', 'ji');
            addAux(10-hIdx, '文昌', 'ji'); addAux(4+hIdx, '文曲', 'ji');
            const ky = {'甲':[1,7],'乙':[0,8],'丙':[11,9],'丁':[11,9],'戊':[1,7],'己':[0,8],'庚':[1,7],'辛':[6,2],'壬':[3,5],'癸':[3,5]}[ganName];
            if(ky) { addAux(ky[0], '天魁', 'ji'); addAux(ky[1], '天鉞', 'ji'); }
            addAux(11-hIdx, '地空', 'sha'); addAux(11+hIdx, '地劫', 'sha');
            const lcIdx = [2, 3, 5, 6, 5, 6, 8, 9, 11, 0][yTGIdx];
            addAux(lcIdx, '祿存', 'lma'); addAux(lcIdx+1, '擎羊', 'sha'); addAux(lcIdx-1, '陀羅', 'sha');
            addAux([2, 11, 8, 5][yDZIdx % 4], '天馬', 'lma');
            let hs=0, ls=0;
            if(['寅','午','戌'].includes(zhiName)) { hs=1; ls=3; } else if(['申','子','辰'].includes(zhiName)) { hs=2; ls=10; } else if(['巳','酉','丑'].includes(zhiName)) { hs=3; ls=10; } else { hs=9; ls=10; }
            addAux(hs+hIdx, '火星', 'sha'); addAux(ls+hIdx, '鈴星', 'sha');
            const area = document.getElementById('mainChart');
            area.querySelectorAll('.cell').forEach(c => { if(!c.id) c.remove(); });
            const order = [5, 6, 7, 8, 4, -1, -1, 9, 3, -1, -1, 10, 2, 1, 0, 11];
            order.forEach(dzIdx => {
                if (dzIdx === -1) return;
                const cell = document.createElement('div'); cell.className = 'cell';
                let aH = '<div class="aux-star-container">', mH = '<div class="main-star-container">';
                auxStarMap[dzIdx].forEach(s => { aH += `<div class="aux-star-box ${s.type}"><span class="aux-star-text">${s.name}</span>${s.sh!==-1?`<span class="shihua-tag ${['shihua-lu','shihua-quan','shihua-ke','shihua-ji'][s.sh]}">${['祿','權','科','忌'][s.sh]}</span>`:''}</div>`; });
                mainStarMap[dzIdx].forEach(s => { mH += `<div class="main-star-box"><span class="main-star-text">${s.name}</span>${s.sh!==-1?`<span class="shihua-tag ${['shihua-lu','shihua-quan','shihua-ke','shihua-ji'][s.sh]}">${['祿','權','科','忌'][s.sh]}</span>`:''}</div>`; });
                const pIdx = (mPos - dzIdx + 12) % 12;
                cell.innerHTML = `<div class="stars-wrapper">${aH}</div>${mH}</div><span class="dz-text">${DZ[dzIdx]}</span><span class="palace-tag ${pIdx === 0 ? 'is-ming' : ''}">${PALACES[pIdx]}</span>`;
                area.appendChild(cell);
            });
            document.getElementById('centerInfo').innerHTML = `<p class="text-sm font-black">${name}</p><p class="text-[10px] text-indigo-500 font-bold mb-1">${personType}</p><div class="w-full text-[9px] space-y-1"><p class="bg-white p-1 rounded shadow-sm">國: ${solar.toYmd()}</p><p class="bg-white p-1 rounded shadow-sm">農: ${lunar.getYearInGanZhi()} ${lunar.getMonthInChinese()}${lunar.getDayInChinese()}</p></div><div class="mt-2 px-3 py-0.5 bg-red-50 text-red-600 text-[9px] font-black rounded-full border border-red-100">${juice}局</div>`;
            document.getElementById('chartContainer').classList.remove('hidden');
        });
    </script>
</body>
</html>
